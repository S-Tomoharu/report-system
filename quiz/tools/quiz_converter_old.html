<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クイズ変換ツール</title>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
    startup: { typeset: false }
  };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #f5f6fa;
    --panel: #ffffff;
    --panel2: #f0f2f8;
    --border: #e2e6f0;
    --accent: #4a7cff;
    --accent2: #6c4fff;
    --success: #18a865;
    --warn: #d4a012;
    --danger: #e03050;
    --text: #1a1f36;
    --muted: #8892b0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── ヘッダー ── */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--panel);
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .logo span { color: var(--muted); }
  header .sep { flex: 1; }
  .header-meta { font-size: 12px; color: var(--muted); }

  /* ── メインレイアウト ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 53px);
  }

  /* ── ツールバー ── */
  .toolbar {
    grid-column: 1 / -1;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: var(--mono);
    margin-right: 4px;
  }

  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--text);
  }
  .btn-ghost:hover { background: var(--panel2); border-color: var(--accent); color: var(--accent); }
  .btn-success {
    background: rgba(46,204,135,0.12);
    border-color: rgba(46,204,135,0.3);
    color: var(--success);
  }
  .btn-success:hover { background: rgba(46,204,135,0.2); }

  .sep-v { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* 回入力 */
  .round-input {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .round-input input {
    width: 60px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    text-align: center;
  }
  .round-input input:focus { outline: none; border-color: var(--accent); }
  .round-input select {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
  }
  .round-input select:focus { outline: none; border-color: var(--accent); }

  .archive-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .archive-toggle input[type=checkbox] {
    width: 14px; height: 14px;
    accent-color: var(--danger);
    cursor: pointer;
  }

  /* ステータス */
  .status {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .status.ok { color: var(--success); }
  .status.warn { color: var(--warn); }

  /* ── 左パネル：ソース ── */
  .pane {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .pane-header {
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pane-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .dot-blue { background: var(--accent); }
  .dot-green { background: var(--success); }

  textarea {
    flex: 1;
    background: #fafbff;
    color: var(--text);
    border: none;
    padding: 16px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    resize: none;
    outline: none;
  }
  textarea::placeholder { color: var(--muted); }

  /* ── 右パネル：プレビュー ── */
  .preview-pane {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .preview-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: var(--bg);
  }
  .preview-scroll::-webkit-scrollbar { width: 6px; }
  .preview-scroll::-webkit-scrollbar-track { background: transparent; }
  .preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* 問題カード */
  .q-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .q-card:hover { border-color: var(--accent); }
  .q-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .q-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: rgba(91,141,238,0.12);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
  }
  .q-badge-archive {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--danger);
    background: rgba(247,83,106,0.12);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(247,83,106,0.25);
  }
  .q-badge-round {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .q-text {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.8;
    margin-bottom: 14px;
    color: var(--text);
  }
  .q-choices {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .q-choice {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.6;
    border: 1px solid transparent;
    color: var(--muted);
  }
  .q-choice.correct {
    background: rgba(46,204,135,0.08);
    border-color: rgba(46,204,135,0.25);
    color: var(--success);
  }
  .q-choice-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 1px;
    opacity: 0.7;
  }
  .q-choice.correct .q-choice-label { opacity: 1; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
    line-height: 2;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  .copy-toast {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--success);
    color: #0a2a1c;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <div class="logo">QUIZ <span>/</span> CONVERTER</div>
  <div class="sep"></div>
  <div class="header-meta">Gemini出力 → スプレッドシート変換ツール</div>
</header>

<div class="main">

  <!-- ツールバー -->
  <div class="toolbar">
    <span class="toolbar-label">操作</span>
    <button class="btn btn-primary" id="btnParse">⚡ 整形・プレビュー</button>
    <button class="btn btn-ghost" id="btnClear">クリア</button>
    <div class="sep-v"></div>
    <div class="round-input">
      <span>第</span>
      <input type="number" id="roundNum" value="1" min="1" max="99">
      <span>回</span>
    </div>
    <div class="sep-v"></div>
    <div class="round-input">
      <span>考査</span>
      <select id="examTerm">
        <option value="1学期中間考査">1学期中間</option>
        <option value="1学期期末考査">1学期期末</option>
        <option value="2学期中間考査">2学期中間</option>
        <option value="2学期期末考査">2学期期末</option>
        <option value="学年考査">学年考査</option>
      </select>
    </div>
    <button class="btn btn-success" id="btnCopy">📋 スプレッドシート用にコピー</button>
    <div class="status" id="statusMsg">待機中</div>
  </div>

  <!-- 左：ソース -->
  <div class="pane">
    <div class="pane-header">
      <div class="pane-dot dot-blue"></div>
      SOURCE — Geminiの出力をペースト
    </div>
    <textarea id="sourceInput" placeholder="ここにGeminiのクイズ出力をペーストしてください。

例：
互いに干渉することができる... A: 回折 B: 可干渉性 C: ... D: ... B
ヤングの実験において... A: ... B: ... C: ... D: ... C
..."></textarea>
  </div>

  <!-- 右：プレビュー -->
  <div class="preview-pane">
    <div class="pane-header">
      <div class="pane-dot dot-green"></div>
      PREVIEW — 数式レンダリング確認
    </div>
    <div class="preview-scroll" id="previewArea">
      <div class="empty-state">
        <div class="empty-icon">📐</div>
        Geminiの出力をペーストして<br>「整形・プレビュー」を押してください
      </div>
    </div>
  </div>


<div class="copy-toast" id="copyToast">✓ コピーしました</div>

<script>
// ── パーサー ──────────────────────────────────────────

function stripChoiceLabel(text) {
  // 先頭の「A:」「A.」「A)」「A 」などのラベルを除去
  return text.replace(/^[A-D][:\)\.\s]\s*/, '').trim();
}

function wrapLatex(text) {
  if (text.includes('$')) return text;

  // LaTeXコマンドを含むかたまりを検出して$...$で囲む
  // \command の後に続くトークン（引数など）もまとめて取り込む
  // 戦略：\を含むトークンが現れたら、}で閉じるまでをまとめる
  const tokens = text.split(' ');
  const result = [];
  let mathBuffer = [];
  let inMath = false;
  let braceDepth = 0;

  // \command を含む、または _^ を含むトークンを数式とみなす
  // ただし日本語文字・句読点のみのトークンは数式から除外
  const isJapanese = (t) => /^[\u3000-\u9FFF\uFF00-\uFFEF、。「」（）]+$/.test(t);
  const hasMathToken = (t) => !isJapanese(t) && (/\\[a-zA-Z]+/.test(t) || /[_^]/.test(t));

  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    if (inMath) {
      // 数式モード中：}の数を追跡して閉じを検出
      mathBuffer.push(t);
      for (const ch of t) {
        if (ch === '{') braceDepth++;
        if (ch === '}') braceDepth--;
      }
      // ブレースが閉じていて、次のトークンが数式でない場合は終了
      if (braceDepth <= 0) {
        const next = tokens[i + 1];
        if (!next || !hasMathToken(next)) {
          result.push('$' + mathBuffer.join(' ') + '$');
          mathBuffer = [];
          inMath = false;
          braceDepth = 0;
        }
      }
    } else if (hasMathToken(t)) {
      mathBuffer.push(t);
      inMath = true;
      braceDepth = 0;
      for (const ch of t) {
        if (ch === '{') braceDepth++;
        if (ch === '}') braceDepth--;
      }
    } else {
      result.push(t);
    }
  }
  if (mathBuffer.length > 0) {
    result.push('$' + mathBuffer.join(' ') + '$');
  }

  return result.join(' ');
}

function parseGeminiOutput(raw) {
  if (!raw.trim()) return [];

  // 空白行でブロックに分割
  const blocks = raw.split(/\n\s*\n/).map(b => b.trim()).filter(b => b.length > 0);
  const questions = [];

  for (const block of blocks) {
    // タイトル行など（選択肢・正解を含まない行）はスキップ
    // ブロック内の行を取得
    const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);

    for (const line of lines) {
      // タブ区切り形式：問題文\tA\tB\tC\tD\t正解
      const parts = line.split('\t');
      if (parts.length >= 6) {
        const ans = parts[parts.length - 1].trim();
        if (!/^[ABCD]$/.test(ans)) continue;
        const q = wrapLatex(parts[0].trim());
        const a = wrapLatex(stripChoiceLabel(parts[1].trim()));
        const b = wrapLatex(stripChoiceLabel(parts[2].trim()));
        const c = wrapLatex(stripChoiceLabel(parts[3].trim()));
        const d = wrapLatex(stripChoiceLabel(parts[4].trim()));
        if (!q || !a || !b || !c || !d) continue;
        questions.push({ q, a, b, c, d, ans });
        continue;
      }

      // スペース区切り形式（フォールバック）
      // 末尾のA/B/C/Dを正解として取得
      const ansMatch = line.match(/\s([ABCD])\s*$/);
      if (!ansMatch) continue;
      const ans = ansMatch[1];
      const body = line.slice(0, ansMatch.index).trim();

      // 選択肢を分割（A: / A) / A. 形式）
      const choiceRegex = /\s+([ABCD])[:\)\.\s]\s*/g;
      const splits = [];
      let m;
      while ((m = choiceRegex.exec(body)) !== null) {
        splits.push({ index: m.index, label: m[1], end: m.index + m[0].length });
      }
      if (splits.length < 4) continue;

      const qText = body.slice(0, splits[0].index).trim();
      const choices = [];
      for (let i = 0; i < splits.length; i++) {
        const start = splits[i].end;
        const end = i + 1 < splits.length ? splits[i + 1].index : body.length;
        choices.push(body.slice(start, end).trim());
      }
      if (choices.length < 4 || !qText) continue;

      questions.push({
        q: wrapLatex(qText),
        a: wrapLatex(choices[0]),
        b: wrapLatex(choices[1]),
        c: wrapLatex(choices[2]),
        d: wrapLatex(choices[3]),
        ans
      });
    }
  }

  return questions;
}

// ── プレビュー描画 ──────────────────────────────────────

function buildPreview(questions, round, examTerm) {
  const area = document.getElementById('previewArea');

  if (questions.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div>問題を検出できませんでした。<br>形式を確認してください。</div>`;
    return;
  }

  const labels = ['A', 'B', 'C', 'D'];
  const choiceKeys = ['a', 'b', 'c', 'd'];

  let html = '';
  questions.forEach((q, i) => {
    const choicesHtml = choiceKeys.map((k, ci) => {
      const isCorrect = labels[ci] === q.ans;
      return `<div class="q-choice ${isCorrect ? 'correct' : ''}">
        <span class="q-choice-label">${labels[ci]}.</span>
        <span class="q-choice-text">${q[k]}</span>
      </div>`;
    }).join('');

    html += `<div class="q-card">
      <div class="q-card-header">
        <span class="q-num">Q${String(i+1).padStart(2,'0')}</span>
        <span class="q-badge-round">${examTerm}</span><span class="q-badge-round">第${round}回</span>
        
      </div>
      <div class="q-text">${q.q}</div>
      <div class="q-choices">${choicesHtml}</div>
    </div>`;
  });

  area.innerHTML = html;

  // MathJax再レンダリング
  function doTypeset() {
    if (window.MathJax && window.MathJax.typesetPromise) {
      MathJax.typesetClear([area]);
      MathJax.typesetPromise([area]).catch(e => console.warn('MathJax error:', e));
    } else {
      setTimeout(doTypeset, 300);
    }
  }
  doTypeset();
}

// ── TSV生成 ──────────────────────────────────────────────

function buildTSV(questions, round, examTerm) {
  // 列：問題文・A・B・C・D・正解・形式・考査区分・回
  return questions.map(q =>
    [q.q, q.a, q.b, q.c, q.d, q.ans, '4択', examTerm, round]
      .join('\t')
  ).join('\n');
}

// ── イベント ──────────────────────────────────────────────

let parsedQuestions = [];

document.getElementById('btnParse').addEventListener('click', () => {
  const raw = document.getElementById('sourceInput').value;
  const round = document.getElementById('roundNum').value || '1';

  parsedQuestions = parseGeminiOutput(raw);

  const status = document.getElementById('statusMsg');
  if (parsedQuestions.length > 0) {
    status.textContent = `✓ ${parsedQuestions.length}問 検出`;
    status.className = 'status ok';
  } else {
    status.textContent = '⚠ 検出できませんでした';
    status.className = 'status warn';
  }

  const examTerm = document.getElementById('examTerm').value;
  buildPreview(parsedQuestions, round, examTerm);
  const tsv = buildTSV(parsedQuestions, round, examTerm);
});

document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('sourceInput').value = '';
  document.getElementById('previewArea').innerHTML = `<div class="empty-state"><div class="empty-icon">📐</div>Geminiの出力をペーストして<br>「整形・プレビュー」を押してください</div>`;

  document.getElementById('statusMsg').textContent = '待機中';
  document.getElementById('statusMsg').className = 'status';
  parsedQuestions = [];
});

function showToast() {
  const t = document.getElementById('copyToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('btnCopy').addEventListener('click', () => {
  if (parsedQuestions.length === 0) return;
  const round = document.getElementById('roundNum').value || '1';
  const examTerm = document.getElementById('examTerm').value;
  const tsv = buildTSV(parsedQuestions, round, examTerm);
  navigator.clipboard.writeText(tsv).then(showToast);
});

// 回・アーカイブ変更時にTSVだけ更新
['roundNum', 'examTerm'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (parsedQuestions.length === 0) return;
    const round = document.getElementById('roundNum').value || '1';
    const examTerm = document.getElementById('examTerm').value;
    buildPreview(parsedQuestions, round, examTerm);
  });
});
</script>
</body>
</html>
