<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クイズ変換ツール</title>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
    startup: { typeset: false }
  };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
<style>
  :root {
    --bg: #f5f6fa; --panel: #fff; --border: #e2e6f0;
    --accent: #4a7cff; --success: #18a865; --warn: #d4a012;
    --text: #1a1f36; --muted: #8892b0;
    --mono: 'IBM Plex Mono', monospace; --sans: 'Noto Sans JP', sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); }

  header {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 500; white-space: nowrap; }
  .sep { width: 1px; height: 18px; background: var(--border); }
  .fg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .fg input[type=number], .fg select {
    padding: 4px 7px; border: 1px solid var(--border); border-radius: 5px;
    font-size: 12px; background: var(--bg); color: var(--text);
  }
  .fg input[type=number] { width: 52px; text-align: center; font-family: var(--mono); }
  .btn {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    cursor: pointer; font-size: 12px; font-weight: 500; font-family: var(--sans);
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: .88; }
  .btn-ghost { background: transparent; color: var(--text); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-success { background: rgba(24,168,101,.1); color: var(--success); border-color: rgba(24,168,101,.3); }
  .btn-success:hover { background: rgba(24,168,101,.18); }
  .status { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }
  .status.ok { color: var(--success); } .status.warn { color: var(--warn); }

  .paste-section {
    background: var(--panel); border-bottom: 2px solid var(--border); padding: 12px 16px;
  }
  .plabel { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono); margin-bottom: 6px; }
  #sourceInput {
    width: 100%; height: 110px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 7px; padding: 10px; font-family: var(--mono); font-size: 11px;
    line-height: 1.6; resize: vertical; color: var(--text); outline: none;
  }
  #sourceInput:focus { border-color: var(--accent); }

  .qs { padding: 14px 16px; }

  .q-block {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 10px; overflow: hidden;
  }
  .q-head {
    display: flex; align-items: center; gap: 7px; padding: 7px 12px;
    background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .qn { font-family: var(--mono); font-size: 10px; color: var(--accent); background: rgba(74,124,255,.1); padding: 2px 7px; border-radius: 4px; }
  .qb { font-family: var(--mono); font-size: 10px; color: var(--muted); background: rgba(0,0,0,.05); padding: 2px 7px; border-radius: 4px; }

  .q-body { display: grid; grid-template-columns: 1fr 1fr; }
  .q-src { border-right: 1px solid var(--border); padding: 10px 12px; }
  .q-prev { padding: 10px 12px; }
  .pn { font-size: 9px; font-weight: 500; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono); margin-bottom: 7px; }

  .sf { margin-bottom: 5px; }
  .sfl { font-size: 9px; color: var(--muted); font-family: var(--mono); margin-bottom: 2px; }
  .sf input[type=text] {
    width: 100%; padding: 4px 7px; border: 1px solid var(--border);
    border-radius: 5px; font-family: var(--mono); font-size: 11px;
    background: var(--bg); color: var(--text); outline: none;
  }
  .sf input[type=text]:focus { border-color: var(--accent); }
  .sans-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; font-size: 11px; color: var(--muted); }
  .sans-row select { padding: 3px 7px; border: 1px solid var(--border); border-radius: 5px; font-size: 11px; background: var(--bg); }

  .pq { font-size: 13px; font-weight: 500; line-height: 1.7; margin-bottom: 8px; }
  .pc { display: flex; flex-direction: column; gap: 4px; }
  .pch {
    display: flex; align-items: flex-start; gap: 7px;
    padding: 5px 9px; border: 1px solid var(--border); border-radius: 5px;
    font-size: 12px; color: var(--muted); line-height: 1.5;
  }
  .pch.ok { background: #d4edda; border-color: #18a865; color: #155724; }
  .pcl { font-family: var(--mono); font-size: 9px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }

  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; line-height: 2; }

  .copy-toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--success); color: #fff; padding: 9px 18px;
    border-radius: 7px; font-size: 13px; font-weight: 700;
    opacity: 0; transition: all .3s; pointer-events: none; z-index: 200;
  }
  .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">QUIZ / CONVERTER</div>
  <div class="fg">
    <span>第</span>
    <input type="number" id="roundNum" value="1" min="1" max="99">
    <span>回</span>
  </div>
  <div class="fg">
    <select id="examTerm">
      <option value="1学期中間考査">1学期中間</option>
      <option value="1学期期末考査">1学期期末</option>
      <option value="2学期中間考査">2学期中間</option>
      <option value="2学期期末考査">2学期期末</option>
      <option value="学年考査">学年考査</option>
    </select>
  </div>
  <div class="sep"></div>
  <button class="btn btn-primary" id="btnParse">⚡ 整形</button>
  <button class="btn btn-ghost" id="btnClear">クリア</button>
  <div class="sep"></div>
  <button class="btn btn-success" id="btnCopy">📋 コピー</button>
  <div class="status" id="statusMsg">待機中</div>
</header>

<div class="paste-section">
  <div class="plabel">Gemini出力をここにペースト</div>
  <textarea id="sourceInput" placeholder="Geminiのクイズ出力をここにペーストして「整形」を押してください。"></textarea>
</div>

<div class="qs" id="qs">
  <div class="empty">Geminiの出力をペーストして「整形」を押してください</div>
</div>

<div class="copy-toast" id="copyToast">✓ コピーしました</div>

<script>
function stripChoiceLabel(t) { return t.replace(/^[A-D][:\)\.\s]\s*/, '').trim(); }

function wrapLatex(text) {
  if (text.includes('$')) return text;
  const tokens = text.split(' ');
  const result = [], mb = [];
  let inMath = false, bd = 0;
  const isJP = t => /^[\u3000-\u9FFF\uFF00-\uFFEF、。「」（）]+$/.test(t);
  const hasMath = t => !isJP(t) && (/\\[a-zA-Z]+/.test(t) || /[_^]/.test(t));
  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    if (inMath) {
      mb.push(t);
      for (const c of t) { if (c==='{') bd++; if (c==='}') bd--; }
      if (bd <= 0 && (!tokens[i+1] || !hasMath(tokens[i+1]))) {
        result.push('$' + mb.join(' ') + '$'); mb.length = 0; inMath = false; bd = 0;
      }
    } else if (hasMath(t)) {
      mb.push(t); inMath = true; bd = 0;
      for (const c of t) { if (c==='{') bd++; if (c==='}') bd--; }
    } else { result.push(t); }
  }
  if (mb.length) result.push('$' + mb.join(' ') + '$');
  return result.join(' ');
}

let parsedQuestions = [];
const LABELS = ['A','B','C','D'];
const KEYS = ['a','b','c','d'];

function parseGeminiOutput(raw) {
  if (!raw.trim()) return [];

  // 「問題N」で始まるブロックに分割
  // 各ブロックのrawテキストを保持しつつパースを試みる
  const lines = raw.split('\n');
  const blocks = []; // { rawLines: [], qNum, qText, choiceLine }
  let current = null;

  for (const line of lines) {
    const trimmed = line.trim();
    if (/^問題\d+/.test(trimmed)) {
      if (current) blocks.push(current);
      const tabIdx = trimmed.indexOf('\t');
      current = {
        rawLines: [line],
        qNum: tabIdx >= 0 ? trimmed.substring(0, tabIdx) : trimmed,
        qText: tabIdx >= 0 ? trimmed.substring(tabIdx + 1) : '',
        choiceLine: ''
      };
    } else if (current) {
      current.rawLines.push(line);
      if (/A:[^\t]+/.test(trimmed) && /B:[^\t]+/.test(trimmed)) {
        current.choiceLine += (current.choiceLine ? ' ' : '') + trimmed;
      } else if (line.startsWith('\t') && trimmed) {
        current.choiceLine += (current.choiceLine ? ' ' : '') + trimmed;
      } else if (current.choiceLine) {
        current.choiceLine += ' ' + trimmed;
      } else if (trimmed) {
        current.qText += ' ' + trimmed;
      }
    }
  }
  if (current) blocks.push(current);

  const results = [];
  for (const block of blocks) {
    const rawText = block.rawLines.join('\n');
    
    // 選択肢をパース
    let parts = block.choiceLine.split('\t').map(s => s.trim()).filter(Boolean);
    if (parts.length < 5) {
      const aM = block.choiceLine.match(/A:(.+?)(?=\s+B:)/s);
      const bM = block.choiceLine.match(/B:(.+?)(?=\s+C:)/s);
      const cM = block.choiceLine.match(/C:(.+?)(?=\s+D:)/s);
      const dM = block.choiceLine.match(/D:(.+?)(?=\s+[ABCD]\s*$)/s);
      const ansM = block.choiceLine.match(/\s([ABCD])\s*$/);
      if (aM && bM && cM && dM && ansM) {
        parts = ['A:'+aM[1].trim(), 'B:'+bM[1].trim(), 'C:'+cM[1].trim(), 'D:'+dM[1].trim(), ansM[1]];
      }
    }

    if (parts.length >= 5) {
      const ans = parts[parts.length - 1];
      if (/^[ABCD]$/.test(ans)) {
        const a = parts[0].replace(/^[A-D]:/, '').trim();
        const b = parts[1].replace(/^[A-D]:/, '').trim();
        const c = parts[2].replace(/^[A-D]:/, '').trim();
        const d = parts[3].replace(/^[A-D]:/, '').trim();
        results.push({
          ok: true,
          raw: rawText,
          q: wrapLatex(block.qText.trim()),
          a: 'A:' + a, b: 'B:' + b, c: 'C:' + c, d: 'D:' + d,
          ans
        });
        continue;
      }
    }

    // パース失敗でも必ず表示する
    results.push({ ok: false, raw: rawText });
  }
  return results;
}



function updatePreview(i) {
  const ta = document.getElementById(`src-${i}`);
  const prevEl = document.getElementById(`qprev-${i}`);
  if (!ta || !prevEl) return;

  const results = parseGeminiOutput(ta.value);
  const q = results.find(r => r.ok);

  if (!q) {
    const pq = document.getElementById(`pq-${i}`);
    if (pq) pq.textContent = '認識できません。形式を確認してください。';
    // ERRORスタイルに更新
    const block = ta.closest('.q-block');
    if (block) {
      block.style.borderColor = '#e03050';
      ta.style.borderColor = '#e03050';
      ta.style.background = '#fff8f8';
    }
    return;
  }

  // OK：プレビュー更新
  const choices = KEYS.map((k,ki) => {
    const text = q[k].replace(/^[A-D]:/, '').trim();
    return `<div class="pch${LABELS[ki]===q.ans?' ok':''}" id="pc-${i}-${ki}">
      <span class="pcl">${LABELS[ki]}.</span>
      <span class="pct">${text}</span>
    </div>`;
  }).join('');

  prevEl.innerHTML = `
    <div class="pn">プレビュー</div>
    <div class="pq" id="pq-${i}">${q.q}</div>
    <div class="pc">${choices}</div>`;

  // OKスタイルに更新
  const block = ta.closest('.q-block');
  if (block) {
    block.style.borderColor = 'var(--border)';
    ta.style.borderColor = 'var(--border)';
    ta.style.background = 'var(--bg)';
  }

  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetClear([prevEl]);
    MathJax.typesetPromise([prevEl]);
  }
}

function buildBlocks(qs) {
  const section = document.getElementById('qs');
  if (!qs.length) {
    section.innerHTML = '<div class="empty">⚠️ 問題を検出できませんでした。</div>'; return;
  }
  const round = document.getElementById('roundNum').value || '1';
  const term = document.getElementById('examTerm').value;

  section.innerHTML = qs.map((q, i) => {
    const isOk = q.ok;
    const borderColor = isOk ? 'var(--border)' : '#e03050';
    const headBg = isOk ? 'var(--bg)' : '#fff0f0';
    const badge = isOk
      ? `<span class="qn">Q${String(i+1).padStart(2,'0')}</span><span class="qb">${term}</span><span class="qb">第${round}回</span>`
      : `<span class="qn" style="color:#e03050;background:rgba(224,48,80,.1)">ERROR</span><span class="qb">形式が認識できませんでした</span>`;

    // 右側プレビューHTML
    let previewHtml = '';
    if (isOk) {
      const choices = KEYS.map((k,ki) => {
        const text = q[k].replace(/^[A-D]:/, '').trim();
        return `<div class="pch${LABELS[ki]===q.ans?' ok':''}" id="pc-${i}-${ki}">
          <span class="pcl">${LABELS[ki]}.</span>
          <span class="pct">${text}</span>
        </div>`;
      }).join('');
      previewHtml = `<div class="pq" id="pq-${i}">${q.q}</div><div class="pc">${choices}</div>`;
    } else {
      previewHtml = `<div id="pq-${i}" style="color:var(--muted);font-size:12px">左側を修正すると表示されます</div>`;
    }

    // 生テキストをそのまま左側に表示
    const escaped = q.raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const lineCount = Math.min(Math.max(q.raw.split('\n').length + 1, 3), 8);

    return `
    <div class="q-block" style="border-color:${borderColor}">
      <div class="q-head" style="background:${headBg}">
        ${badge}
      </div>
      <div class="q-body">
        <div class="q-src">
          <div class="pn">ソース（編集可）</div>
          <textarea id="src-${i}" rows="${lineCount}" style="width:100%;font-family:var(--mono);font-size:11px;padding:8px;border:1px solid ${isOk?'var(--border)':'#e03050'};border-radius:5px;background:${isOk?'var(--bg)':'#fff8f8'};resize:vertical;line-height:1.6" oninput="updatePreview(${i})">${escaped}</textarea>
        </div>
        <div class="q-prev" id="qprev-${i}">
          <div class="pn">プレビュー</div>
          ${previewHtml}
        </div>
      </div>
    </div>`;
  }).join('');

  function doTypeset() {
    if (window.MathJax && window.MathJax.typesetPromise) {
      MathJax.typesetClear([section]); MathJax.typesetPromise([section]);
    } else setTimeout(doTypeset, 300);
  }
  doTypeset();
}

document.getElementById('btnParse').addEventListener('click', () => {
  const raw = document.getElementById('sourceInput').value;
  parsedQuestions = parseGeminiOutput(raw);
  const st = document.getElementById('statusMsg');
  const okCount = parsedQuestions.filter(q => q.ok).length;
  const errCount = parsedQuestions.filter(q => !q.ok).length;
  if (parsedQuestions.length === 0) {
    st.textContent = '⚠ 検出できませんでした'; st.className = 'status warn';
  } else {
    st.textContent = errCount > 0 ? `✓ ${okCount}問 検出 / ⚠ ${errCount}件エラー` : `✓ ${okCount}問 検出`;
    st.className = 'status ' + (errCount > 0 ? 'warn' : 'ok');
  }
  buildBlocks(parsedQuestions);
});

document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('sourceInput').value = '';
  document.getElementById('qs').innerHTML = '<div class="empty">Geminiの出力をペーストして「整形」を押してください</div>';
  document.getElementById('statusMsg').textContent = '待機中';
  document.getElementById('statusMsg').className = 'status';
  parsedQuestions = [];
});

function showToast() {
  const t = document.getElementById('copyToast');
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
}

function buildTSV() {
  const round = document.getElementById('roundNum').value || '1';
  const term = document.getElementById('examTerm').value;
  const rows = [];
  parsedQuestions.forEach((_, i) => {
    const ta = document.getElementById(`src-${i}`);
    if (!ta) return;
    const results = parseGeminiOutput(ta.value);
    const q = results.find(r => r.ok);
    if (!q) return;
    const a = q.a.replace(/^[A-D]:/, '').trim();
    const b = q.b.replace(/^[A-D]:/, '').trim();
    const c = q.c.replace(/^[A-D]:/, '').trim();
    const d = q.d.replace(/^[A-D]:/, '').trim();
    rows.push([q.q, a, b, c, d, q.ans, '4択', term, round].join('\t'));
  });
  return rows.join('\n');
}

document.getElementById('btnCopy').addEventListener('click', () => {
  if (!parsedQuestions.length) return;
  navigator.clipboard.writeText(buildTSV()).then(showToast);
});

['roundNum','examTerm'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    // buildBlocksは呼ばずヘッダーバッジだけ更新
    const round = document.getElementById('roundNum').value || '1';
    const term = document.getElementById('examTerm').value;
    document.querySelectorAll('.qb').forEach((el, i) => {
      // 各問題の2番目・3番目バッジを更新
      const idx = i % 2;
      if (idx === 0) el.textContent = term;
      if (idx === 1) el.textContent = '第' + round + '回';
    });
  });
});
</script>
</body>
</html>
