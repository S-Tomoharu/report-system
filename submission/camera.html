<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>カメラで撮影 - A4レポート</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #a4Frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      aspect-ratio: 210 / 297;
      width: min(84vw, calc(84vh * 210 / 297));
      border: 3px dashed rgba(255, 255, 255, 0.6);
      border-radius: 4px;
      transition: border-color 0.2s ease;
    }

    .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      background: rgba(255, 255, 255, 0.8);
      border: 2px solid white;
      border-radius: 2px;
    }

    .corner-tl { top: 2%; left: 2%; }
    .corner-tr { top: 2%; right: 2%; }
    .corner-bl { bottom: 2%; left: 2%; }
    .corner-br { bottom: 2%; right: 2%; }

    #controls {
      position: fixed;
      bottom: 32px;
      left: 0;
      right: 0;
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 0 20px;
      pointer-events: auto;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #captureBtn {
      background: #2563eb;
      color: white;
    }

    #captureBtn:active {
      opacity: 0.8;
    }

    #closeBtn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    #closeBtn:active {
      opacity: 0.7;
    }

    #error {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      padding: 16px;
      background: rgba(220, 38, 38, 0.9);
      color: white;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>

  <div id="overlay">
    <div id="a4Frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
    </div>
  </div>

  <div id="controls">
    <button id="captureBtn">📸 撮影する</button>
    <button id="closeBtn">閉じる</button>
  </div>

  <div id="error"></div>

  <script>
    const video = document.getElementById('video');
    const a4Frame = document.getElementById('a4Frame');
    const captureBtn = document.getElementById('captureBtn');
    const closeBtn = document.getElementById('closeBtn');
    const errorMsg = document.getElementById('error');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
    }

    // ── 自動シャッター機能 ────────────────────────────────────
    const MARKER_DETECT_PARAMS = {
      MARKER_SIZE_RATIO: 0.03,
      MARGIN_RATIO: 0.5,
      MIN_CONTRAST: 15,
      DARK_THRESH: 140,
      EXCLUDE_MARGIN_RATIO: 0.03,
      MAX_CENTER_BRIGHTNESS: 120,
      DETECTION_RANGE_RATIO: 0.2,
      DARK_PIXEL_RATIO_MIN: 0.6,
      MIN_BORDER_BRIGHTNESS: 10,
      BORDER_CHECK_DISTANCE: 3,
      MIN_CANDIDATE_DISTANCE: 50,
    };

    function findMarker(imgData, imgW, imgH, rx, ry, rw, rh, params) {
      const d = imgData.data;
      const { MARKER_SIZE_RATIO, MARGIN_RATIO, MIN_CONTRAST, DARK_THRESH, MAX_CENTER_BRIGHTNESS, DARK_PIXEL_RATIO_MIN, MIN_BORDER_BRIGHTNESS, BORDER_CHECK_DISTANCE, MIN_CANDIDATE_DISTANCE } = params;

      const winW = Math.max(8, Math.round(imgW * MARKER_SIZE_RATIO));
      const winH = Math.max(8, Math.round(imgH * MARKER_SIZE_RATIO));

      const gray = new Uint8Array(rw * rh);
      for (let y = 0; y < rh; y++) {
        for (let x = 0; x < rw; x++) {
          const i = ((ry + y) * imgW + (rx + x)) * 4;
          gray[y * rw + x] = Math.round(d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114);
        }
      }

      const W1 = rw + 1;
      const integ = new Int32Array((rh + 1) * W1);
      for (let y = 1; y <= rh; y++) {
        for (let x = 1; x <= rw; x++) {
          integ[y * W1 + x] = gray[(y-1) * rw + (x-1)]
            + integ[(y-1) * W1 + x]
            + integ[y * W1 + (x-1)]
            - integ[(y-1) * W1 + (x-1)];
        }
      }

      const stepX = Math.max(1, Math.round(winW / 3));
      const stepY = Math.max(1, Math.round(winH / 3));
      const margin = Math.max(4, Math.round(winW * MARGIN_RATIO));

      const allCandidates = [];

      for (let y = 0; y + winH <= rh; y += stepY) {
        for (let x = 0; x + winW <= rw; x += stepX) {
          const centerSum = integ[(y+winH) * W1 + (x+winW)]
                          - integ[y        * W1 + (x+winW)]
                          - integ[(y+winH) * W1 + x]
                          + integ[y        * W1 + x];

          const x0 = Math.max(0, x - margin);
          const y0 = Math.max(0, y - margin);
          const x1 = Math.min(rw, x + winW + margin);
          const y1 = Math.min(rh, y + winH + margin);

          const outerSum = integ[y1 * W1 + x1]
                         - integ[y0 * W1 + x1]
                         - integ[y1 * W1 + x0]
                         + integ[y0 * W1 + x0];

          const surroundSum = outerSum - centerSum;
          const surroundPixels = (x1 - x0) * (y1 - y0) - (winW * winH);

          if (surroundPixels <= 0) continue;

          const surroundAvg = surroundSum / surroundPixels;
          const centerAvg = centerSum / (winW * winH);
          const contrast = surroundAvg - centerAvg;

          const candidate = { contrast, x, y, centerAvg };
          allCandidates.push(candidate);
          allCandidates.sort((a, b) => b.contrast - a.contrast);
          if (allCandidates.length > 10) allCandidates.pop();
        }
      }

      if (allCandidates.length === 0) return null;

      const candidates = [];
      for (const cand of allCandidates) {
        let isFarEnough = true;
        for (const selected of candidates) {
          const dist = Math.sqrt(Math.pow(cand.x - selected.x, 2) + Math.pow(cand.y - selected.y, 2));
          if (dist < MIN_CANDIDATE_DISTANCE) {
            isFarEnough = false;
            break;
          }
        }
        if (isFarEnough) {
          candidates.push(cand);
          if (candidates.length >= 3) break;
        }
      }

      if (candidates.length === 0) return null;

      const results = [];
      for (const cand of candidates) {
        let sx = 0, sy = 0, cnt = 0;
        const cx1 = Math.min(cand.x + winW, rw), cy1 = Math.min(cand.y + winH, rh);
        for (let y = cand.y; y < cy1; y++) {
          for (let x = cand.x; x < cx1; x++) {
            if (gray[y * rw + x] < DARK_THRESH) {
              sx += rx + x;
              sy += ry + y;
              cnt++;
            }
          }
        }

        if (cnt === 0) continue;

        const darkRatio = cnt / (winW * winH);

        let borderBrightness = 255;
        const borderPixels = [];
        const bx1 = Math.min(cand.x + winW, rw), by1 = Math.min(cand.y + winH, rh);
        for (let y = Math.max(0, cand.y - BORDER_CHECK_DISTANCE); y < Math.min(rh, by1 + BORDER_CHECK_DISTANCE); y++) {
          for (let x = Math.max(0, cand.x - BORDER_CHECK_DISTANCE); x < Math.min(rw, bx1 + BORDER_CHECK_DISTANCE); x++) {
            if ((x < cand.x || x >= bx1) || (y < cand.y || y >= by1)) {
              borderPixels.push(gray[y * rw + x]);
            }
          }
        }

        if (borderPixels.length > 0) {
          borderBrightness = borderPixels.reduce((a, b) => a + b, 0) / borderPixels.length;
        }

        results.push({
          x: sx / cnt,
          y: sy / cnt,
          contrast: cand.contrast,
          brightness: cand.centerAvg,
          darkRatio: darkRatio,
          borderBrightness: borderBrightness
        });
      }

      return results.length > 0 ? results : null;
    }

    function detectAllCorners(imgData, imgW, imgH) {
      // 親ウィンドウ（submission.html）のパラメータがあれば使用（通常は存在しない）
      const params = (window.opener && window.opener.MARKER_DETECT_PARAMS) || MARKER_DETECT_PARAMS;

      const range = params.DETECTION_RANGE_RATIO;
      const excl = params.EXCLUDE_MARGIN_RATIO;
      const rw = Math.round(imgW * range);
      const rh = Math.round(imgH * range);
      const ex = Math.round(imgW * excl);
      const ey = Math.round(imgH * excl);

      const corners = [
        { rx: ex,          ry: ey           },
        { rx: imgW - rw - ex, ry: ey        },
        { rx: ex,          ry: imgH - rh - ey },
        { rx: imgW - rw - ex, ry: imgH - rh - ey },
      ];

      return corners.every(({ rx, ry }) => {
        const result = findMarker(imgData, imgW, imgH, rx, ry, rw, rh, params);
        if (!result) return false;
        return result.some(r =>
          r.contrast >= params.MIN_CONTRAST &&
          r.brightness <= params.MAX_CENTER_BRIGHTNESS &&
          r.darkRatio >= params.DARK_PIXEL_RATIO_MIN &&
          r.borderBrightness >= params.MIN_BORDER_BRIGHTNESS
        );
      });
    }

    const detectCanvas = document.createElement('canvas');
    const DETECT_WIDTH = 1280;
    let autoShutterEnabled = true;
    let frameCount = 0;
    let detectCount = 0;
    const DETECT_INTERVAL = 3;    // 3フレームに1回検出
    const DETECT_THRESHOLD = 5;   // 5回連続で約 0.5 秒
    let animId = null;

    function autoShutterLoop() {
      animId = requestAnimationFrame(autoShutterLoop);
      if (!video.srcObject || !autoShutterEnabled) return;

      frameCount++;
      if (frameCount % DETECT_INTERVAL !== 0) return;

      const scale = DETECT_WIDTH / video.videoWidth;
      detectCanvas.width = DETECT_WIDTH;
      detectCanvas.height = Math.round(video.videoHeight * scale);
      detectCanvas.getContext('2d').drawImage(video, 0, 0, detectCanvas.width, detectCanvas.height);

      const imgData = detectCanvas.getContext('2d').getImageData(
        0, 0, detectCanvas.width, detectCanvas.height
      );

      if (detectAllCorners(imgData, detectCanvas.width, detectCanvas.height)) {
        detectCount++;
        a4Frame.style.borderColor = `rgba(34, 197, 94, ${0.4 + detectCount / DETECT_THRESHOLD * 0.6})`;
        if (detectCount >= DETECT_THRESHOLD) {
          autoShutterEnabled = false;
          captureBtn.click();
        }
      } else {
        detectCount = 0;
        a4Frame.style.borderColor = 'rgba(255, 255, 255, 0.6)';
      }
    }

    function stopCamera() {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 4000 },
            height: { ideal: 6000 }
          }
        });
        video.srcObject = stream;
        video.addEventListener('loadedmetadata', () => {
          autoShutterLoop();
        }, { once: true });
      } catch (err) {
        showError('カメラを起動できませんでした。ブラウザの設定でアクセスを許可してください。');
        console.error(err);
      }
    }

    function getCoverOffset(video) {
      const vW = video.videoWidth;
      const vH = video.videoHeight;
      const eW = video.clientWidth;
      const eH = video.clientHeight;

      const videoAspect = vW / vH;
      const elemAspect = eW / eH;

      let renderW, renderH, offsetX, offsetY;

      if (videoAspect > elemAspect) {
        // ビデオが横長：上下がクリップされずに左右がはみ出す
        renderH = eH;
        renderW = eH * videoAspect;
        offsetX = (renderW - eW) / 2;
        offsetY = 0;
      } else {
        // ビデオが縦長：左右がクリップされずに上下がはみ出す
        renderW = eW;
        renderH = eW / videoAspect;
        offsetX = 0;
        offsetY = (renderH - eH) / 2;
      }

      return {
        offsetX,
        offsetY,
        scaleX: vW / renderW,
        scaleY: vH / renderH
      };
    }

    captureBtn.addEventListener('click', () => {
      autoShutterEnabled = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }

      if (!video.srcObject) {
        showError('カメラがまだ起動していません。');
        return;
      }

      const frameRect = a4Frame.getBoundingClientRect();
      const { offsetX, offsetY, scaleX, scaleY } = getCoverOffset(video);

      // 画面座標をビデオ座標に変換
      const srcX = (frameRect.left + offsetX) * scaleX;
      const srcY = (frameRect.top + offsetY) * scaleY;
      const srcW = frameRect.width * scaleX;
      const srcH = frameRect.height * scaleY;

      // トリミング用Canvas
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(srcW);
      canvas.height = Math.round(srcH);

      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);

      // Blob変換 → postMessage → 閉じる
      canvas.toBlob(blob => {
        if (!blob) {
          showError('⚠️ Blob が null です');
          return;
        }

        console.log(`📸 toBlob callback実行、blob.size = ${blob.size}`);

        // iOS Safari 非対応の blob.arrayBuffer() の代わりに FileReader を使用
        const reader = new FileReader();

        reader.onload = (e) => {
          console.log('📸 FileReader.onload 実行');
          const buffer = e.target.result;
          console.log(`📸 buffer.byteLength = ${buffer.byteLength}`);

          if (!window.opener) {
            showError('⚠️ 親ウィンドウが見つかりません');
            return;
          }

          console.log('📸 postMessage 実行開始');
          window.opener.postMessage(
            {
              type: 'cameraCapture',
              buffer,
              fileName: `camera_${Date.now()}.jpg`
            },
            '*',
            [buffer]
          );
          console.log('📸 postMessage 実行完了');
          console.log('📸 stopCamera() 実行開始');
          stopCamera();
          console.log('📸 stopCamera() 実行完了');
          console.log('📸 window.close() 実行開始');
          window.close();
        };

        reader.onerror = (err) => {
          console.error(`⚠️ FileReader エラー: ${err}`);
          showError(`ファイル読み込みエラー: ${err}`);
        };

        console.log('📸 FileReader.readAsArrayBuffer() 呼び出し');
        reader.readAsArrayBuffer(blob);
      }, 'image/jpeg', 0.95);
    });

    closeBtn.addEventListener('click', () => {
      stopCamera();
      window.close();
    });

    window.addEventListener('beforeunload', stopCamera);

    // カメラ起動
    startCamera();
  </script>
</body>
</html>
