<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物理レポート提出</title>
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #d8d4cc;
      --text: #1a1a18;
      --text-sub: #6b6860;
      --accent: #2c5f8a;
      --accent-light: #e8f0f7;
      --success: #2a7a4b;
      --success-light: #e8f5ee;
      --error: #b83232;
      --error-light: #fdf0f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    .container { max-width: 560px; margin: 0 auto; }

    header { margin-bottom: 28px; }
    .label {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-sub);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    h1 span {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-sub);
      margin-top: 4px;
    }

    /* ── 生徒情報 ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .student-info-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .student-info-field { display: flex; flex-direction: column; gap: 5px; }
    .student-info-field label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.04em;
    }
    .student-select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    .student-select:focus { outline: none; border-color: var(--accent); background: #fff; }
    .student-select:disabled { opacity: 0.5; cursor: not-allowed; }
    .f-class .student-select { min-width: 90px; }
    .f-num  .student-select { min-width: 72px; }

    /* ── 撮影ステップ ── */
    .shoot-step {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .shoot-step.active {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .shoot-step.done {
      border-color: var(--success);
      background: var(--success-light);
    }
    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .step-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-sub);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .shoot-step.active .step-badge { background: var(--accent); color: white; }
    .shoot-step.done .step-badge { background: var(--success); color: white; }
    .step-title {
      font-size: 15px;
      font-weight: 700;
    }
    .step-content {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .thumb-placeholder {
      width: 72px;
      height: 100px;
      border: 2px dashed var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--border);
      flex-shrink: 0;
    }
    .thumb-img {
      width: 72px;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid var(--success);
      flex-shrink: 0;
    }
    .step-info { flex: 1; }
    .step-desc {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 12px;
    }
    .shoot-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .shoot-btn:hover { opacity: 0.88; }
    .shoot-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .done-label {
      font-size: 13px;
      color: var(--success);
      font-weight: 600;
    }
    .reshoot-btn {
      margin-top: 8px;
      padding: 6px 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-sub);
      cursor: pointer;
    }
    .reshoot-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 提出ボタン ── */
    .submit-area { margin-top: 24px; }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .submit-btn:not(:disabled):hover { opacity: 0.88; }

    /* ── ステータス ── */
    .status {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .status.error { background: var(--error-light); color: var(--error); display: block; }
    .status.loading { background: var(--accent-light); color: var(--accent); display: block; }
    .status.success { background: var(--success-light); color: var(--success); display: block; }

    /* ── バージョン表示 ── */
    #versionBadge {
      position: fixed;
      top: 8px;
      right: 8px;
      font-size: 11px;
      color: var(--text-sub);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      z-index: 999;
    }
    #panel-done {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    #panel-done .done-icon { font-size: 48px; margin-bottom: 16px; }
    #panel-done h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    #panel-done p { font-size: 14px; color: var(--text-sub); }
  </style>
</head>
<body>
  <div id="versionBadge">v20260424-001</div>
  <div class="container">
    <header>
      <div class="label">物理レポート提出</div>
      <h1 id="pageTitle">レポート提出<span id="roundLabel"></span></h1>
    </header>

    <div id="panel-main">
      <!-- 生徒情報 -->
      <div class="card">
        <div class="card-title">生徒情報</div>
        <div class="student-info-row">
          <div class="student-info-field f-class">
            <label>クラス</label>
            <select id="selClass" class="student-select">
              <option value="">選択</option>
            </select>
          </div>
          <div class="student-info-field f-num">
            <label>番号</label>
            <select id="selNum" class="student-select">
              <option value="">選択</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 撮影ステップ -->
      <div id="shootSteps"></div>

      <!-- 提出ボタン -->
      <div class="submit-area">
        <button id="submitBtn" class="submit-btn" disabled>提出する</button>
        <div id="status" class="status"></div>
      </div>
    </div>

    <!-- 完了パネル -->
    <div id="panel-done">
      <div class="done-icon">✅</div>
      <h2>提出完了</h2>
      <p>レポートを受け付けました。</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const VERSION = '20260428-013';
    document.getElementById('versionBadge').textContent = `v${VERSION}`;

    const SUBMISSION_API_URL = 'https://script.google.com/macros/s/AKfycbwCfBkuP9bH45Mqu-UIL_cdMTGAFlvI83w6a4YpDrCo93snbB6iN4saXTy7wzqZtAKQ/exec';
    const QUIZ_API_URL = 'https://script.google.com/macros/s/AKfycbyXmHKNXTf9J1grc6DVzxYyn_dRvTp2rco-tVenlyvXV5NnMjwBCqM4gztH2E3Xv56ReA/exec';
    const YEAR = '2026';

    // ── URLパラメータ取得 ──
    const params = new URLSearchParams(location.search);
    let studentClass = params.get('class') || '';
    let number = params.get('num') || '';
    const round = params.get('round') || '?';
    let expectedPages = parseInt(params.get('pages') || '1'); // 1ページ=表裏2枚

    // タイトル設定
    document.getElementById('roundLabel').textContent = round !== '?' ? `（第${round}回）` : '';
    document.title = `第${round}回物理レポート提出`;

    // ── 撮影データ管理 ──
    // 1ページ=表裏2枚なのでtotalShots = expectedPages * 2
    const totalShots = expectedPages * 2;
    const capturedImages = new Array(totalShots).fill(null); // {dataUrl, blob}
    let currentShotIndex = 0;
    let cameraWindow = null;

    // ── 撮影ステップを生成 ──
    function buildSteps() {
      const container = document.getElementById('shootSteps');
      container.innerHTML = '';
      for (let i = 0; i < totalShots; i++) {
        const pageNum = Math.floor(i / 2) + 1;
        const side = i % 2 === 0 ? '表' : '裏';
        const step = document.createElement('div');
        step.className = 'shoot-step';
        step.id = `step-${i}`;
        step.innerHTML = `
          <div class="step-header">
            <div class="step-badge">${i + 1}</div>
            <div class="step-title">${pageNum}枚目 - ${side}</div>
          </div>
          <div class="step-content">
            <div class="thumb-placeholder" id="thumb-${i}">📄</div>
            <div class="step-info">
              <div class="step-desc" id="desc-${i}">${pageNum}枚目の${side}を撮影してください</div>
              <button class="shoot-btn" id="shootBtn-${i}" onclick="openCamera(${i})" disabled>📷 撮影する</button>
            </div>
          </div>
        `;
        container.appendChild(step);
      }
      updateStepUI();
    }

    function updateStepUI() {
      for (let i = 0; i < totalShots; i++) {
        const step = document.getElementById(`step-${i}`);
        const btn = document.getElementById(`shootBtn-${i}`);
        const thumb = document.getElementById(`thumb-${i}`);

        if (capturedImages[i]) {
          // 撮影済み
          step.className = 'shoot-step done';
          document.getElementById(`desc-${i}`).style.display = 'none';
          thumb.outerHTML = `<img class="thumb-img" id="thumb-${i}" src="${capturedImages[i].dataUrl}">`;
          btn.textContent = '撮り直す';
          btn.onclick = () => openCameraRetake(i);
          btn.disabled = !studentClass || !number;
        } else if (i === currentShotIndex) {
          // 現在のステップ
          step.className = 'shoot-step active';
          btn.disabled = !studentClass || !number;
        } else {
          // 未撮影・非アクティブ
          step.className = 'shoot-step';
          btn.disabled = true;
        }
      }
      updateSubmitButton();
    }

    function updateSubmitButton() {
      const allCaptured = capturedImages.every(img => img !== null);
      const studentOk = !!studentClass && !!number;
      document.getElementById('submitBtn').disabled = !(allCaptured && studentOk);
    }

    // ── 撮り直し（1枚だけ撮影してsubmissionに戻る）──
    function openCameraRetake(shotIndex) {
      if (cameraWindow && !cameraWindow.closed) {
        cameraWindow.focus();
        return;
      }
      currentShotIndex = shotIndex;
      const w = 480, h = 780;
      const left = Math.round(window.screenX + (window.outerWidth - w) / 2);
      const top = Math.round(window.screenY + (window.outerHeight - h) / 2);
      const params = `totalShots=1&currentShot=${shotIndex}`;
      cameraWindow = window.open(`debug/camera_debug.html?${params}`, 'camera',
        `width=${w},height=${h},left=${left},top=${top},resizable=yes`);
      if (!cameraWindow) {
        showStatus('error', 'ポップアップがブロックされました。ブラウザの設定でポップアップを許可してください。');
      }
    }

    // ── カメラを開く ──
    function openCamera(shotIndex) {
      if (cameraWindow && !cameraWindow.closed) {
        cameraWindow.focus();
        return;
      }
      currentShotIndex = shotIndex;
      const w = 480, h = 780;
      const left = Math.round(window.screenX + (window.outerWidth - w) / 2);
      const top = Math.round(window.screenY + (window.outerHeight - h) / 2);
      const params = `totalShots=${totalShots}&currentShot=${shotIndex}`;
      cameraWindow = window.open(`debug/camera_debug.html?${params}`, 'camera',
        `width=${w},height=${h},left=${left},top=${top},resizable=yes`);
      if (!cameraWindow) {
        showStatus('error', 'ポップアップがブロックされました。ブラウザの設定でポップアップを許可してください。');
      }
    }

    // ── camera.htmlからの画像受け取り ──
    window.addEventListener('message', (event) => {
      if (event.data?.type !== 'cameraCapture') return;
      const { dataUrl, fileName, shotIndex } = event.data;

      fetch(dataUrl).then(r => r.blob()).then(blob => {
        const idx = shotIndex !== undefined ? shotIndex : currentShotIndex;
        capturedImages[idx] = { dataUrl, blob, fileName };

        // 次のステップへ
        if (idx < totalShots - 1) {
          currentShotIndex = idx + 1;
        } else {
          currentShotIndex = idx;
        }
        updateStepUI();
      });

      if (event.source) {
        event.source.postMessage({ type: 'cameraCaptureAcknowledged' }, '*');
      }
    });

    // ── 生徒情報セレクト ──
    function setupStudentSelects() {
      const selClass = document.getElementById('selClass');
      const selNum = document.getElementById('selNum');

      if (studentClass) {
        const opt = document.createElement('option');
        opt.value = studentClass; opt.textContent = studentClass; opt.selected = true;
        selClass.appendChild(opt);
        selClass.disabled = true;
      }
      if (number) {
        const opt = document.createElement('option');
        opt.value = number; opt.textContent = `${number}番`; opt.selected = true;
        selNum.appendChild(opt);
        selNum.disabled = true;
      }

      // GASからクラス・番号を取得
      if (!studentClass || !number) {
        fetch(`${QUIZ_API_URL}?action=getConfig`)
          .then(r => r.json())
          .then(data => {
            if (data.classes) {
              data.classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                if (c === studentClass) opt.selected = true;
                selClass.appendChild(opt);
              });
            }
            for (let i = 1; i <= 50; i++) {
              const opt = document.createElement('option');
              opt.value = i; opt.textContent = `${i}番`;
              if (String(i) === String(number)) opt.selected = true;
              selNum.appendChild(opt);
            }
          })
          .catch(() => {
            // フォールバック：手動入力
            for (let i = 1; i <= 50; i++) {
              const opt = document.createElement('option');
              opt.value = i; opt.textContent = `${i}番`;
              selNum.appendChild(opt);
            }
          });
      }

      selClass.addEventListener('change', () => {
        studentClass = selClass.value;
        updateStepUI();
      });
      selNum.addEventListener('change', () => {
        number = selNum.value;
        updateStepUI();
      });
    }

    // ── 提出 ──
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      showStatus('loading', 'PDFを作成中...');

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
        for (let i = 0; i < capturedImages.length; i++) {
          if (i > 0) doc.addPage();
          doc.addImage(capturedImages[i].dataUrl, 'JPEG', 0, 0, 210, 297);
        }
        const pdfBlob = doc.output('blob');

        // サイズ確認用ログ
        console.log(`PDFサイズ: ${(pdfBlob.size / 1024 / 1024).toFixed(2)}MB`);

        // まずダウンロードして確認
        const dlLink = document.createElement('a');
        dlLink.href = URL.createObjectURL(pdfBlob);
        dlLink.download = `report_preview.pdf`;
        document.body.appendChild(dlLink);
        dlLink.click();
        document.body.removeChild(dlLink);

        showStatus('loading', 'PDFを確認してください。問題なければ次回提出時にDriveへ送信します。');
        btn.disabled = false;
        return; // ←一旦ここで止める（Drive送信はまだしない）

        showStatus('loading', 'アップロード中...');

        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(pdfBlob);
        });

        const today = new Date();
        const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

        const payload = {
          year: YEAR,
          round,
          studentClass,
          number: String(number).padStart(2, '0'),
          date: dateStr,
          pdfBase64: base64
        };

        const res = await fetch(SUBMISSION_API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || '保存に失敗しました');

        document.getElementById('panel-main').style.display = 'none';
        document.getElementById('panel-done').style.display = 'block';

      } catch (err) {
        showStatus('error', `エラーが発生しました：${err.message}`);
        btn.disabled = false;
      }
    });

    // ── ステータス表示 ──
    function showStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = `status ${type}`;
      el.textContent = msg;
    }

    // ── 初期化 ──
    setupStudentSelects();
    buildSteps();
  </script>
</body>
</html>
