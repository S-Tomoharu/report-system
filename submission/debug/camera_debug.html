<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>カメラで撮影 - マーカー検出</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #displayCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #version {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 12px;
      color: #888;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 12px;
      border-radius: 4px;
    }

    #controls {
      position: fixed;
      bottom: 32px;
      left: 0;
      right: 0;
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 0 20px;
      pointer-events: auto;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #captureBtn {
      background: #2563eb;
      color: white;
    }

    #captureBtn:active {
      opacity: 0.8;
    }

    #closeBtn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    #closeBtn:active {
      opacity: 0.7;
    }

    #error {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      padding: 16px;
      background: rgba(220, 38, 38, 0.9);
      color: white;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <video id="video"></video>
  <canvas id="displayCanvas"></canvas>
  <div id="version"></div>
  <div id="error"></div>

  <div id="controls">
    <button id="captureBtn">撮影する</button>
    <button id="closeBtn">閉じる</button>
  </div>

  <script>
    const VERSION = '20260418-034';
    document.getElementById('version').textContent = `v${VERSION}`;

    console.log('[camera_debug] Script started, version:', VERSION);

    // ========== DOM要素 ==========
    const video = document.getElementById('video');
    const displayCanvas = document.getElementById('displayCanvas');
    const captureBtn = document.getElementById('captureBtn');
    const closeBtn = document.getElementById('closeBtn');
    const errorDiv = document.getElementById('error');

    // ========== 仕様書の値（固定） ==========
    const A4_WIDTH = 1080;
    const A4_HEIGHT = 1527;

    const EVALUATION_POINTS = {
      blue: { a4X: 540, a4Y: 763.5, label: '青' },
      green: { a4X: 540, a4Y: 0, label: '緑' },
      purple: { a4X: 1013, a4Y: 763.5, label: '紫' }
    };

    // ========== パラメータ ==========
    // marker_debug.html から URL パラメータで渡される
    let MARKER_DETECT_PARAMS = {
      MARKER_SIZE_RATIO: 0.038,
      MARGIN_RATIO: 0.5,
      VIDEO_SCALE: 1.0,
      VIDEO_OFFSET_Y: 0
    };

    // URL パラメータから値を取得して上書き
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('MARKER_SIZE_RATIO')) {
      MARKER_DETECT_PARAMS.MARKER_SIZE_RATIO = parseFloat(urlParams.get('MARKER_SIZE_RATIO'));
    }
    if (urlParams.has('MARGIN_RATIO')) {
      MARKER_DETECT_PARAMS.MARGIN_RATIO = parseFloat(urlParams.get('MARGIN_RATIO'));
    }
    if (urlParams.has('VIDEO_SCALE')) {
      MARKER_DETECT_PARAMS.VIDEO_SCALE = parseFloat(urlParams.get('VIDEO_SCALE'));
    }
    if (urlParams.has('VIDEO_OFFSET_Y')) {
      MARKER_DETECT_PARAMS.VIDEO_OFFSET_Y = parseFloat(urlParams.get('VIDEO_OFFSET_Y'));
    }

    console.log('[camera_debug] MARKER_DETECT_PARAMS initialized from URL:', MARKER_DETECT_PARAMS);

    // ========== ビデオ解像度（初回取得後は固定） ==========
    let videoW = 0;
    let videoH = 0;

    // ========== キャンバス ==========
    const dataCanvas = document.createElement('canvas');
    const dataCtx = dataCanvas.getContext('2d');

    // ========== アニメーション管理 ==========
    let animId = null;
    let frameCount = 0;
    let debugInfo = {};

    // ========== エラー表示 ==========
    function showError(msg) {
      console.error('[camera_debug] Error:', msg);
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    // ========== 座標変換: A4座標 → ビデオ座標 ==========
    function a4ToVideo(a4X, a4Y, videoW, videoH) {
      const offsetX = (videoW - A4_WIDTH) / 2;
      const offsetY = (videoH - A4_HEIGHT) / 2;
      return {
        x: offsetX + a4X,
        y: offsetY + a4Y
      };
    }

    // ========== 座標変換: A4座標 → 画面座標 ==========
    // displayScale は processFrame() で計算して渡される
    function a4ToScreen(a4X, a4Y, displayScale, params) {
      return {
        x: displayScale * (a4X - A4_WIDTH / 2) + window.innerWidth / 2,
        y: displayScale * (a4Y - A4_HEIGHT / 2) + window.innerHeight / 2 + params.VIDEO_OFFSET_Y
      };
    }

    // ========== コントラスト計算 ==========
    function calculateContrast(imgData, videoX, videoY, windowSize, videoW, videoH, params) {
      const d = imgData.data;

      // グレースケール変換
      const gray = new Uint8Array(videoW * videoH);
      for (let i = 0; i < videoW * videoH; i++) {
        const p = i * 4;
        gray[i] = Math.round(d[p] * 0.299 + d[p+1] * 0.587 + d[p+2] * 0.114);
      }

      // 積分画像構築
      const W1 = videoW + 1;
      const integ = new Int32Array((videoH + 1) * W1);
      for (let y = 1; y <= videoH; y++) {
        for (let x = 1; x <= videoW; x++) {
          integ[y * W1 + x] = gray[(y-1) * videoW + (x-1)]
            + integ[(y-1) * W1 + x] + integ[y * W1 + (x-1)] - integ[(y-1) * W1 + (x-1)];
        }
      }

      // 矩形領域の合計を高速計算
      function rectSum(x0, y0, x1, y1) {
        x0 = Math.max(0, x0);
        y0 = Math.max(0, y0);
        x1 = Math.min(videoW, x1);
        y1 = Math.min(videoH, y1);
        if (x0 >= x1 || y0 >= y1) return 0;
        return integ[y1*W1+x1] - integ[y0*W1+x1] - integ[y1*W1+x0] + integ[y0*W1+x0];
      }

      // 中央ウィンドウ
      const vX = Math.round(videoX);
      const vY = Math.round(videoY);
      const centerS = rectSum(vX, vY, vX + windowSize, vY + windowSize);
      const cA = centerS / (windowSize * windowSize);

      // 周辺ウィンドウ
      const margin = Math.round(windowSize * params.MARGIN_RATIO);
      const ox0 = vX - margin;
      const oy0 = vY - margin;
      const ox1 = vX + windowSize + margin;
      const oy1 = vY + windowSize + margin;
      const outerS = rectSum(ox0, oy0, ox1, oy1);
      const sP = (ox1-ox0)*(oy1-oy0) - (windowSize*windowSize);
      const sA = sP > 0 ? (outerS - centerS) / sP : 0;

      // コントラスト値（元の小数値で計算してから丸める）
      const C = sA - cA;

      return {
        CS: Math.round(centerS),
        OS: Math.round(outerS),
        sP: sP,
        cA: Math.round(cA),
        sA: Math.round(sA),
        C: C.toFixed(1),
        centerS_raw: centerS.toFixed(1),
        outerS_raw: outerS.toFixed(1)
      };
    }

    // ========== カメラ起動 ==========
    async function startCamera() {
      try {
        console.log('[camera_debug] Requesting camera access...');
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('getUserMedia not supported');
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1080 },
            height: { ideal: 1920 }
          }
        });

        console.log('[camera_debug] Stream obtained');

        console.log('[camera_debug] Setting up loadedmetadata listener');
        video.addEventListener('loadedmetadata', () => {
          // ビデオ解像度を一度だけ取得（初回のみ）
          videoW = video.videoWidth;
          videoH = video.videoHeight;

          // 機種依存対応：小さいほうを W、大きいほうを H に統一
          if (videoW > videoH) {
            [videoW, videoH] = [videoH, videoW];
          }

          console.log(`[camera_debug] loadedmetadata event fired! Video: ${videoW}×${videoH}`);
          processFrame();
        }, { once: true });

        video.srcObject = stream;
        console.log('[camera_debug] video.srcObject set, calling play()');
        await video.play();
        console.log('[camera_debug] video.play() completed');

        // fallback: loadedmetadata が発火しない場合
        setTimeout(() => {
          if (video.videoWidth > 0 && !animId) {
            // ビデオ解像度を一度だけ取得（初回のみ）
            videoW = video.videoWidth;
            videoH = video.videoHeight;

            // 機種依存対応：小さいほうを W、大きいほうを H に統一
            if (videoW > videoH) {
              [videoW, videoH] = [videoH, videoW];
            }

            console.log('[camera_debug] Fallback: loadedmetadata not fired, calling processFrame() manually');
            processFrame();
          }
        }, 1000);
      } catch (err) {
        showError('カメラを起動できませんでした: ' + err.message);
      }
    }

    // ========== フレーム処理 ==========
    function processFrame() {
      if (!video.srcObject) return;

      animId = requestAnimationFrame(processFrame);
      frameCount++;

      if (frameCount % 3 !== 0) return; // 3フレームごと

      if (videoW === 0 || videoH === 0) return;

      // データキャンバスをリサイズ
      if (dataCanvas.width !== videoW || dataCanvas.height !== videoH) {
        dataCanvas.width = videoW;
        dataCanvas.height = videoH;
      }

      // ビデオからピクセルデータ取得
      dataCtx.drawImage(video, 0, 0, videoW, videoH);
      const imgData = dataCtx.getImageData(0, 0, videoW, videoH);

      // ウィンドウサイズ計算（A4座標系の幅に対する比率）
      const windowSize = Math.round(A4_WIDTH * MARKER_DETECT_PARAMS.MARKER_SIZE_RATIO);

      // 画面表示スケールを計算（1回だけ）
      // A4座標系基準でスケールを計算（スマホ機種に動的対応）
      const baseScale = Math.min(window.innerWidth / A4_WIDTH, window.innerHeight / A4_HEIGHT) * 0.9;
      const displayScale = baseScale * MARKER_DETECT_PARAMS.VIDEO_SCALE;

      // 表示用キャンバス初期化
      displayCanvas.width = window.innerWidth;
      displayCanvas.height = window.innerHeight;
      const dispCtx = displayCanvas.getContext('2d');
      dispCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);

      // displayScale が NaN なら画面に表示してデバッグ
      if (isNaN(displayScale)) {
        dispCtx.fillStyle = 'red';
        dispCtx.font = 'bold 24px monospace';
        dispCtx.fillText(`ERROR: displayScale is NaN`, 10, 50);
        console.error('[camera_debug] displayScale is NaN!', { baseScale, VIDEO_SCALE: MARKER_DETECT_PARAMS.VIDEO_SCALE, window_innerWidth: window.innerWidth, window_innerHeight: window.innerHeight, videoW, videoH });
      }

      // ========== A4枠の表示（白い矩形） ==========
      const a4Corners = [
        { a4X: 0, a4Y: 0 },           // 左上
        { a4X: 1080, a4Y: 0 },        // 右上
        { a4X: 1080, a4Y: 1527 },     // 右下
        { a4X: 0, a4Y: 1527 }         // 左下
      ];

      const screenCorners = [];
      for (const corner of a4Corners) {
        const screenPt = a4ToScreen(corner.a4X, corner.a4Y, displayScale, MARKER_DETECT_PARAMS);
        screenCorners.push(screenPt);
      }

      // 白い矩形枠を描画
      dispCtx.strokeStyle = 'white';
      dispCtx.lineWidth = 2;
      dispCtx.beginPath();
      dispCtx.moveTo(screenCorners[0].x, screenCorners[0].y);  // 左上
      dispCtx.lineTo(screenCorners[1].x, screenCorners[1].y);  // 右上
      dispCtx.lineTo(screenCorners[2].x, screenCorners[2].y);  // 右下
      dispCtx.lineTo(screenCorners[3].x, screenCorners[3].y);  // 左下
      dispCtx.lineTo(screenCorners[0].x, screenCorners[0].y);  // 左上に戻る
      dispCtx.stroke();

      // ========== 各評価点を処理 ==========
      dispCtx.font = 'bold 13px monospace';
      for (const [key, point] of Object.entries(EVALUATION_POINTS)) {
        // A4座標 → ビデオ座標（評価計算用）
        const videoPt = a4ToVideo(point.a4X, point.a4Y, videoW, videoH);

        // コントラスト計算
        const contrast = calculateContrast(imgData, videoPt.x, videoPt.y, windowSize, videoW, videoH, MARKER_DETECT_PARAMS);

        // デバッグ：緑の点の情報を保存（画面表示用）
        if (key === 'green') {
          debugInfo = {
            a4X: point.a4X, a4Y: point.a4Y,
            videoX: videoPt.x.toFixed(1), videoY: videoPt.y.toFixed(1),
            windowSize: windowSize,
            CS: contrast.CS, OS: contrast.OS, sP: contrast.sP,
            cA: contrast.cA, sA: contrast.sA, C: contrast.C,
            centerS_raw: contrast.centerS_raw, outerS_raw: contrast.outerS_raw
          };
        }

        // A4座標 → 画面座標（表示用）
        const screenPt = a4ToScreen(point.a4X, point.a4Y, displayScale, MARKER_DETECT_PARAMS);

        // 画面での描画サイズ（displayScale を使用）
        const screenWindowSize = windowSize * displayScale;

        // 色決定
        let color;
        if (key === 'blue') color = 'rgba(0, 150, 255, 0.7)';
        else if (key === 'green') color = 'rgba(0, 255, 100, 0.7)';
        else color = 'rgba(200, 100, 255, 0.7)';

        // 枠描画
        dispCtx.strokeStyle = color;
        dispCtx.lineWidth = 2;
        dispCtx.strokeRect(screenPt.x, screenPt.y, screenWindowSize, screenWindowSize);

        // テキスト描画
        dispCtx.fillStyle = color;
        const lines = [
          point.label,
          `CS=${contrast.CS}`,
          `OS=${contrast.OS} | sP=${contrast.sP}`,
          `cA=${contrast.cA}`,
          `sA=${contrast.sA}`,
          `C=${contrast.C}`
        ];

        let textY = screenPt.y - 50;
        for (const line of lines) {
          dispCtx.fillText(line, screenPt.x, textY);
          textY += 16;
        }
      }

      // ========== MARKER_DETECT_PARAMS を画面上に表示 ==========
      dispCtx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      dispCtx.font = 'bold 14px monospace';

      // A4(0,0) の画面座標を計算
      const screenOrigin = a4ToScreen(0, 0, displayScale, MARKER_DETECT_PARAMS);

      // video の object-fit: cover スケール係数
      const videoScaleCover = Math.max(window.innerWidth / videoW, window.innerHeight / videoH);

      const paramText = [
        `window.innerWidth: ${window.innerWidth}`,
        `window.innerHeight: ${window.innerHeight}`,
        `videoW: ${videoW}, videoH: ${videoH}`,
        `baseScale (for a4ToScreen): ${baseScale.toFixed(4)}`,
        `videoScale (object-fit: cover): ${videoScaleCover.toFixed(4)}`,
        `displayScale: ${displayScale.toFixed(4)}`,
        `MARKER_SIZE_RATIO: ${MARKER_DETECT_PARAMS.MARKER_SIZE_RATIO.toFixed(3)}`,
        `MARGIN_RATIO: ${MARKER_DETECT_PARAMS.MARGIN_RATIO.toFixed(1)}`,
        `VIDEO_SCALE: ${MARKER_DETECT_PARAMS.VIDEO_SCALE.toFixed(2)}`,
        `VIDEO_OFFSET_Y: ${MARKER_DETECT_PARAMS.VIDEO_OFFSET_Y.toFixed(0)}`,
        `A4(0,0) -> Screen(${screenOrigin.x.toFixed(1)}, ${screenOrigin.y.toFixed(1)})`
      ];
      let paramY = 20;
      for (const line of paramText) {
        dispCtx.fillText(line, 10, paramY);
        paramY += 20;
      }

      // ========== デバッグ情報（緑の点）を表示 ==========
      const debugText = [
        `[DEBUG GREEN]`,
        `A4(${debugInfo.a4X}, ${debugInfo.a4Y}) -> Video(${debugInfo.videoX}, ${debugInfo.videoY})`,
        `windowSize: ${debugInfo.windowSize}`,
        `CS=${debugInfo.CS} (raw: ${debugInfo.centerS_raw}), OS=${debugInfo.OS} (raw: ${debugInfo.outerS_raw})`,
        `sP=${debugInfo.sP}`,
        `cA=${debugInfo.cA}, sA=${debugInfo.sA}, C=${debugInfo.C}`
      ];
      let debugY = paramY + 20;
      dispCtx.fillStyle = 'rgba(0, 255, 100, 0.9)';
      for (const line of debugText) {
        dispCtx.fillText(line, 10, debugY);
        debugY += 20;
      }
    }

    // ========== 撮影 ==========
    captureBtn.addEventListener('click', () => {

      // A4領域をトリミング
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = A4_WIDTH;
      tempCanvas.height = A4_HEIGHT;
      const tempCtx = tempCanvas.getContext('2d');

      const videoW = video.videoWidth;
      const videoH = video.videoHeight;
      const offsetX = (videoW - A4_WIDTH) / 2;
      const offsetY = (videoH - A4_HEIGHT) / 2;

      tempCtx.drawImage(
        video,
        offsetX, offsetY, A4_WIDTH, A4_HEIGHT,
        0, 0, A4_WIDTH, A4_HEIGHT
      );

      const imageSrc = tempCanvas.toDataURL('image/jpeg', 0.9);

      // opener に通知
      if (window.opener && window.opener.displayCapturedImage) {
        window.opener.displayCapturedImage(imageSrc);
      }

      // 自動クローズ
      setTimeout(() => {
        window.close();
      }, 1000);
    });

    // ========== 閉じる ==========
    closeBtn.addEventListener('click', () => {
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
      }
      if (animId) cancelAnimationFrame(animId);
      window.close();
    });

    window.addEventListener('beforeunload', () => {
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
      }
    });

    // ========== 初期化 ==========
    startCamera();
  </script>
</body>
</html>
