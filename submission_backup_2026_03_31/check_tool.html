<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レポート提出チェック</title>
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #d8d4cc;
      --text: #1a1a18;
      --text-sub: #6b6860;
      --accent: #2c5f8a;
      --accent-light: #e8f0f7;
      --success: #2a7a4b;
      --success-light: #e8f5ee;
      --error: #b83232;
      --error-light: #fdf0f0;
      --warning: #7a5c1a;
      --warning-light: #fdf6e8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    /* ヘッダー */
    header {
      margin-bottom: 32px;
    }

    .school-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-sub);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.3;
    }

    h1 span {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-sub);
      margin-top: 4px;
      letter-spacing: 0;
    }

    /* ステップインジケーター */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 28px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      background: var(--border);
      color: var(--text-sub);
      transition: all 0.3s ease;
    }

    .step-label {
      font-size: 11px;
      color: var(--text-sub);
      white-space: nowrap;
      transition: color 0.3s ease;
    }

    .step-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 4px;
      min-width: 12px;
    }

    .step.active .step-num {
      background: var(--accent);
      color: white;
    }

    .step.active .step-label {
      color: var(--accent);
      font-weight: 600;
    }

    .step.done .step-num {
      background: var(--success);
      color: white;
    }

    .step.done .step-num::after {
      content: '✓';
    }

    /* カード */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    /* アップロードエリア */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: var(--bg);
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
    }

    .upload-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .upload-sub {
      font-size: 12px;
      color: var(--text-sub);
    }

    /* プレビュー */
    .preview-area {
      display: none;
      position: relative;
    }

    .preview-area.visible {
      display: block;
    }

    .preview-img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: block;
    }

    .preview-reset {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .preview-reset:hover {
      background: rgba(0,0,0,0.8);
    }

    /* ファイル情報 */
    .file-info {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--accent-light);
      border-radius: 6px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--accent);
    }

    .file-info.visible {
      display: flex;
    }

    .file-info-name {
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-info-size {
      color: var(--text-sub);
      flex-shrink: 0;
    }

    /* ボタン */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #1e4a6e;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: var(--border);
      color: var(--text-sub);
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-sub);
      border: 1px solid var(--border);
      font-size: 13px;
      padding: 10px;
    }

    .btn-secondary:hover {
      background: var(--bg);
      color: var(--text);
    }

    /* ステータスメッセージ */
    .status {
      display: none;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .status.visible {
      display: block;
    }

    .status.loading {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid #b8d4ea;
    }

    .status.success {
      background: var(--success-light);
      color: var(--success);
      border: 1px solid #a8d8bc;
    }

    .status.error {
      background: var(--error-light);
      color: var(--error);
      border: 1px solid #e8b4b4;
    }

    .status.warning {
      background: var(--warning-light);
      color: var(--warning);
      border: 1px solid #e0c87a;
    }

    .status-icon {
      font-size: 16px;
      margin-right: 6px;
    }

    /* ローディングアニメーション */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(44, 95, 138, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 結果パネル（後で使う） */
    .result-panel {
      display: none;
    }

    .result-panel.visible {
      display: block;
    }

    /* フッター */
    footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 32px;
      padding-bottom: 16px;
    }

    /* レスポンシブ */
    @media (max-width: 400px) {
      .step-label {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <p class="school-label">Report Submission</p>
      <h1>レポート提出チェック
        <span>提出前に読み取り確認を行ってください</span>
      </h1>
    </header>

    <!-- ステップインジケーター -->
    <div class="steps">
      <div class="step active" id="step1">
        <div class="step-num">1</div>
        <div class="step-label">アップロード</div>
      </div>
      <div class="step-line"></div>
      <div class="step" id="step2">
        <div class="step-num">2</div>
        <div class="step-label">マーク確認</div>
      </div>
      <div class="step-line"></div>
      <div class="step" id="step3">
        <div class="step-num">3</div>
        <div class="step-label">品質確認</div>
      </div>
      <div class="step-line"></div>
      <div class="step" id="step4">
        <div class="step-num">4</div>
        <div class="step-label">提出</div>
      </div>
    </div>

    <!-- ステータス表示 -->
    <div class="status" id="status"></div>

    <!-- STEP 1: アップロード -->
    <div id="panel-upload">
      <div class="card">
        <p class="card-title">写真を選択</p>

        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept="image/*,application/pdf">
          <span class="upload-icon">📷</span>
          <p class="upload-text">タップして写真を選択</p>
          <p class="upload-sub">JPG・PNG・PDF に対応</p>
        </div>

        <div class="file-info" id="fileInfo">
          <span>📄</span>
          <span class="file-info-name" id="fileName"></span>
          <span class="file-info-size" id="fileSize"></span>
        </div>
      </div>

      <div class="preview-area" id="previewArea">
        <img class="preview-img" id="previewImg" src="" alt="プレビュー">
        <button class="preview-reset" id="resetBtn">✕ やり直す</button>
      </div>

      <div style="margin-top: 16px;">
        <button class="btn btn-primary" id="checkBtn" disabled>
          マーク・品質を確認する →
        </button>
      </div>
    </div>

    <!-- STEP 2以降（後で実装） -->
    <div class="result-panel" id="panel-result">
      <!-- マーク読み取り結果・Gemini判定結果をここに表示 -->
    </div>

    <footer>
      アップロードした画像はチェック後に破棄されます
    </footer>

  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const previewArea = document.getElementById('previewArea');
    const previewImg = document.getElementById('previewImg');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const checkBtn = document.getElementById('checkBtn');
    const resetBtn = document.getElementById('resetBtn');
    const status = document.getElementById('status');

    let selectedFile = null;

    // ファイルサイズ表示
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ステータス表示
    function showStatus(type, message) {
      const icons = { loading: '', success: '✅', error: '❌', warning: '⚠️' };
      status.className = `status visible ${type}`;
      if (type === 'loading') {
        status.innerHTML = `<div style="display:flex;align-items:center;gap:8px"><div class="spinner"></div>${message}</div>`;
      } else {
        status.innerHTML = `<span class="status-icon">${icons[type]}</span>${message}`;
      }
    }

    function hideStatus() {
      status.className = 'status';
    }

    // ファイル選択時の処理
    function handleFile(file) {
      if (!file) return;

      // ファイルサイズチェック（10MB上限）
      if (file.size > 10 * 1024 * 1024) {
        showStatus('error', 'ファイルサイズが大きすぎます（10MB以下にしてください）');
        return;
      }

      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      fileInfo.classList.add('visible');
      checkBtn.disabled = false;
      hideStatus();

      // 画像プレビュー
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImg.src = e.target.result;
          previewArea.classList.add('visible');
        };
        reader.readAsDataURL(file);
      } else if (file.type === 'application/pdf') {
        // PDFはプレビューなし
        previewArea.classList.remove('visible');
        showStatus('warning', 'PDFが選択されました。画像での提出を推奨します。');
      }
    }

    // ファイル入力
    fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    // ドラッグ&ドロップ
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });

    // リセット
    resetBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      previewImg.src = '';
      previewArea.classList.remove('visible');
      fileInfo.classList.remove('visible');
      checkBtn.disabled = true;
      hideStatus();
    });

    // チェックボタン（次のステップへ・後で実装）
    checkBtn.addEventListener('click', () => {
      if (!selectedFile) return;
      showStatus('loading', '画像を解析しています...');

      // TODO: STEP2 マーカー検出・マーク読み取り
      // TODO: STEP3 Gemini API 品質判定
      // ここに処理を追加していく

      // 仮の動作確認
      setTimeout(() => {
        showStatus('success', '画像を受け取りました（マーク読み取り・品質判定は次のステップで実装します）');
      }, 1500);
    });
  </script>
</body>
</html>
