<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>カメラで撮影 - マーカー検出デバッグ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #a4Frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      aspect-ratio: 210 / 297;
      width: min(84vw, calc(84vh * 210 / 297));
      border: 3px dashed rgba(255, 255, 255, 0.6);
      border-radius: 4px;
      transition: border-color 0.2s ease;
    }

    .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      background: rgba(255, 255, 255, 0.8);
      border: 2px solid white;
      border-radius: 2px;
    }

    .corner-tl { top: 2%; left: 2%; }
    .corner-tr { top: 2%; right: 2%; }
    .corner-bl { bottom: 2%; left: 2%; }
    .corner-br { bottom: 2%; right: 2%; }

    #controls {
      position: fixed;
      bottom: 32px;
      left: 0;
      right: 0;
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 0 20px;
      pointer-events: auto;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #captureBtn {
      background: #2563eb;
      color: white;
    }

    #captureBtn:active {
      opacity: 0.8;
    }

    #closeBtn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    #closeBtn:active {
      opacity: 0.7;
    }

    #error {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      padding: 16px;
      background: rgba(220, 38, 38, 0.9);
      color: white;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>

  <div id="overlay">
    <canvas id="detectionOverlay" style="position: fixed; inset: 0; pointer-events: none;"></canvas>
    <div id="a4Frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
    </div>
  </div>

  <div id="controls">
    <button id="captureBtn">📸 撮影する</button>
    <button id="closeBtn">閉じる</button>
  </div>

  <div id="error"></div>

  <script>
    const video = document.getElementById('video');
    const a4Frame = document.getElementById('a4Frame');
    const captureBtn = document.getElementById('captureBtn');
    const closeBtn = document.getElementById('closeBtn');
    const errorMsg = document.getElementById('error');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
    }

    // ── 自動シャッター機能 ────────────────────────────────────
    let MARKER_DETECT_PARAMS = {
      MARKER_SIZE_RATIO: 0.03,
      MARGIN_RATIO: 0.5,
      MIN_CONTRAST: 15,
      DARK_THRESH: 140,
      EXCLUDE_MARGIN_RATIO: 0.03,
      MAX_CENTER_BRIGHTNESS: 120,
      DETECTION_RANGE_RATIO: 0.2,
      DARK_PIXEL_RATIO_MIN: 0.6,
      MIN_BORDER_BRIGHTNESS: 10,
      BORDER_CHECK_DISTANCE: 3,
      MIN_CANDIDATE_DISTANCE: 50,
      // 全体スキャン方式の追加パラメータ
      COARSE_STEP_MULTIPLIER: 1.0,
      FINE_SCAN_RADIUS: 2,
      FINE_STEP_DIVIDER: 3,
      TOP_COARSE_CANDIDATES: 20,
      MAX_COMBO_CANDIDATES: 8,
      A4_ASPECT_RATIO: 297 / 210,
      A4_ASPECT_TOLERANCE: 0.25,
      MIN_AREA_RATIO: 0.05,
      MAX_AREA_RATIO: 0.80,
      RECT_SCORE_WEIGHT: 0.5,
      ASPECT_SCORE_WEIGHT: 0.3,
      AREA_SCORE_WEIGHT: 0.1,
      CONTRAST_SCORE_WEIGHT: 0.1,
    };

    // camera_debug が marker_debug から開かれた場合、marker_debug のパラメータで上書き
    let debugMsg = '';
    if (window.opener && window.opener.MARKER_DETECT_PARAMS) {
      MARKER_DETECT_PARAMS = { ...MARKER_DETECT_PARAMS, ...window.opener.MARKER_DETECT_PARAMS };
      debugMsg = `✅ パラメータ継承\nDETECTION_RANGE_RATIO: ${MARKER_DETECT_PARAMS.DETECTION_RANGE_RATIO}`;
      console.log(debugMsg);
    } else {
      debugMsg = `❌ パラメータなし\nwindow.opener: ${!!window.opener}`;
      console.log(debugMsg);
    }

    // デバッグ情報をページに表示
    const debugPanel = document.createElement('div');
    debugPanel.id = 'debugPanel';
    debugPanel.style.cssText = `
      position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8);
      color: #0f0; font-family: monospace; font-size: 10px; padding: 8px;
      max-width: 200px; z-index: 9999; white-space: pre-wrap; word-break: break-all;
    `;
    debugPanel.textContent = debugMsg;
    document.body.appendChild(debugPanel);

    function findMarker(imgData, imgW, imgH, rx, ry, rw, rh, params) {
      const d = imgData.data;
      const { MARKER_SIZE_RATIO, MARGIN_RATIO, MIN_CONTRAST, DARK_THRESH, MAX_CENTER_BRIGHTNESS, DARK_PIXEL_RATIO_MIN, MIN_BORDER_BRIGHTNESS, BORDER_CHECK_DISTANCE, MIN_CANDIDATE_DISTANCE } = params;

      const winW = Math.max(8, Math.round(imgW * MARKER_SIZE_RATIO));
      const winH = Math.max(8, Math.round(imgH * MARKER_SIZE_RATIO));

      const gray = new Uint8Array(rw * rh);
      for (let y = 0; y < rh; y++) {
        for (let x = 0; x < rw; x++) {
          const i = ((ry + y) * imgW + (rx + x)) * 4;
          gray[y * rw + x] = Math.round(d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114);
        }
      }

      const W1 = rw + 1;
      const integ = new Int32Array((rh + 1) * W1);
      for (let y = 1; y <= rh; y++) {
        for (let x = 1; x <= rw; x++) {
          integ[y * W1 + x] = gray[(y-1) * rw + (x-1)]
            + integ[(y-1) * W1 + x]
            + integ[y * W1 + (x-1)]
            - integ[(y-1) * W1 + (x-1)];
        }
      }

      const stepX = Math.max(1, Math.round(winW / 3));
      const stepY = Math.max(1, Math.round(winH / 3));
      const margin = Math.max(4, Math.round(winW * MARGIN_RATIO));

      const allCandidates = [];

      for (let y = 0; y + winH <= rh; y += stepY) {
        for (let x = 0; x + winW <= rw; x += stepX) {
          const centerSum = integ[(y+winH) * W1 + (x+winW)]
                          - integ[y        * W1 + (x+winW)]
                          - integ[(y+winH) * W1 + x]
                          + integ[y        * W1 + x];

          const x0 = Math.max(0, x - margin);
          const y0 = Math.max(0, y - margin);
          const x1 = Math.min(rw, x + winW + margin);
          const y1 = Math.min(rh, y + winH + margin);

          const outerSum = integ[y1 * W1 + x1]
                         - integ[y0 * W1 + x1]
                         - integ[y1 * W1 + x0]
                         + integ[y0 * W1 + x0];

          const surroundSum = outerSum - centerSum;
          const surroundPixels = (x1 - x0) * (y1 - y0) - (winW * winH);

          if (surroundPixels <= 0) continue;

          const surroundAvg = surroundSum / surroundPixels;
          const centerAvg = centerSum / (winW * winH);
          const contrast = surroundAvg - centerAvg;

          const candidate = { contrast, x, y, centerAvg };
          allCandidates.push(candidate);
          allCandidates.sort((a, b) => b.contrast - a.contrast);
          if (allCandidates.length > 10) allCandidates.pop();
        }
      }

      if (allCandidates.length === 0) return null;

      const candidates = [];
      for (const cand of allCandidates) {
        let isFarEnough = true;
        for (const selected of candidates) {
          const dist = Math.sqrt(Math.pow(cand.x - selected.x, 2) + Math.pow(cand.y - selected.y, 2));
          if (dist < MIN_CANDIDATE_DISTANCE) {
            isFarEnough = false;
            break;
          }
        }
        if (isFarEnough) {
          candidates.push(cand);
          if (candidates.length >= 3) break;
        }
      }

      if (candidates.length === 0) return null;

      const results = [];
      for (const cand of candidates) {
        let sx = 0, sy = 0, cnt = 0;
        const cx1 = Math.min(cand.x + winW, rw), cy1 = Math.min(cand.y + winH, rh);
        for (let y = cand.y; y < cy1; y++) {
          for (let x = cand.x; x < cx1; x++) {
            if (gray[y * rw + x] < DARK_THRESH) {
              sx += rx + x;
              sy += ry + y;
              cnt++;
            }
          }
        }

        if (cnt === 0) continue;

        const darkRatio = cnt / (winW * winH);

        let borderBrightness = 255;
        const borderPixels = [];
        const bx1 = Math.min(cand.x + winW, rw), by1 = Math.min(cand.y + winH, rh);
        for (let y = Math.max(0, cand.y - BORDER_CHECK_DISTANCE); y < Math.min(rh, by1 + BORDER_CHECK_DISTANCE); y++) {
          for (let x = Math.max(0, cand.x - BORDER_CHECK_DISTANCE); x < Math.min(rw, bx1 + BORDER_CHECK_DISTANCE); x++) {
            if ((x < cand.x || x >= bx1) || (y < cand.y || y >= by1)) {
              borderPixels.push(gray[y * rw + x]);
            }
          }
        }

        if (borderPixels.length > 0) {
          borderBrightness = borderPixels.reduce((a, b) => a + b, 0) / borderPixels.length;
        }

        results.push({
          x: sx / cnt,
          y: sy / cnt,
          contrast: cand.contrast,
          brightness: cand.centerAvg,
          darkRatio: darkRatio,
          borderBrightness: borderBrightness
        });
      }

      return results.length > 0 ? results : null;
    }

    // ── 全体スキャン方式：候補検出 ────────────────────────────
    function detectAllMarkerCandidates(imgData, imgW, imgH, params) {
      const d = imgData.data;
      const { MARKER_SIZE_RATIO, MARGIN_RATIO, MIN_CONTRAST, DARK_THRESH,
              MAX_CENTER_BRIGHTNESS, DARK_PIXEL_RATIO_MIN, MIN_BORDER_BRIGHTNESS,
              BORDER_CHECK_DISTANCE, MIN_CANDIDATE_DISTANCE,
              COARSE_STEP_MULTIPLIER, FINE_SCAN_RADIUS, FINE_STEP_DIVIDER,
              TOP_COARSE_CANDIDATES, MAX_COMBO_CANDIDATES } = params;

      const winW = Math.max(8, Math.round(imgW * MARKER_SIZE_RATIO));
      const winH = Math.max(8, Math.round(imgH * MARKER_SIZE_RATIO));
      const margin = Math.max(4, Math.round(winW * MARGIN_RATIO));

      // 全体グレースケール変換（1回のみ）
      const gray = new Uint8Array(imgW * imgH);
      for (let i = 0; i < imgW * imgH; i++) {
        const p = i * 4;
        gray[i] = Math.round(d[p] * 0.299 + d[p+1] * 0.587 + d[p+2] * 0.114);
      }

      // 全体積分画像（1回のみ）
      const W1 = imgW + 1;
      const integ = new Int32Array((imgH + 1) * W1);
      for (let y = 1; y <= imgH; y++) {
        for (let x = 1; x <= imgW; x++) {
          integ[y * W1 + x] = gray[(y-1) * imgW + (x-1)]
            + integ[(y-1) * W1 + x] + integ[y * W1 + (x-1)] - integ[(y-1) * W1 + (x-1)];
        }
      }

      function rectSum(x0, y0, x1, y1) {
        x0 = Math.max(0, x0); y0 = Math.max(0, y0);
        x1 = Math.min(imgW, x1); y1 = Math.min(imgH, y1);
        if (x0 >= x1 || y0 >= y1) return 0;
        return integ[y1*W1+x1] - integ[y0*W1+x1] - integ[y1*W1+x0] + integ[y0*W1+x0];
      }

      function calcContrast(x, y) {
        if (x + winW > imgW || y + winH > imgH) return -1;
        const centerS = rectSum(x, y, x + winW, y + winH);
        const centerAvg = centerS / (winW * winH);
        const ox0 = Math.max(0, x - margin), oy0 = Math.max(0, y - margin);
        const ox1 = Math.min(imgW, x + winW + margin), oy1 = Math.min(imgH, y + winH + margin);
        const outerS = rectSum(ox0, oy0, ox1, oy1);
        const surroundPixels = (ox1-ox0)*(oy1-oy0) - (winW*winH);
        if (surroundPixels <= 0) return -1;
        return (outerS - centerS) / surroundPixels - centerAvg;
      }

      // 粗スキャン
      const coarseStep = Math.max(1, Math.round(winW * COARSE_STEP_MULTIPLIER));
      const coarseCandidates = [];
      for (let y = 0; y + winH <= imgH; y += coarseStep) {
        for (let x = 0; x + winW <= imgW; x += coarseStep) {
          const contrast = calcContrast(x, y);
          if (contrast < MIN_CONTRAST) continue;
          const centerAvg = rectSum(x, y, x + winW, y + winH) / (winW * winH);
          if (centerAvg > MAX_CENTER_BRIGHTNESS) continue;
          coarseCandidates.push({ x, y, contrast, centerAvg });
          coarseCandidates.sort((a, b) => b.contrast - a.contrast);
          if (coarseCandidates.length > TOP_COARSE_CANDIDATES) coarseCandidates.pop();
        }
      }
      if (coarseCandidates.length === 0) return [];

      // 精密スキャン
      const fineRadius = Math.round(winW * FINE_SCAN_RADIUS);
      const fineStep = Math.max(1, Math.round(winW / FINE_STEP_DIVIDER));
      const fineCandidates = [];
      for (const coarse of coarseCandidates) {
        const sx = Math.max(0, coarse.x - fineRadius);
        const sy = Math.max(0, coarse.y - fineRadius);
        const ex2 = Math.min(imgW - winW, coarse.x + fineRadius);
        const ey2 = Math.min(imgH - winH, coarse.y + fineRadius);
        for (let y = sy; y <= ey2; y += fineStep) {
          for (let x = sx; x <= ex2; x += fineStep) {
            const contrast = calcContrast(x, y);
            if (contrast < MIN_CONTRAST) continue;
            const centerAvg = rectSum(x, y, x + winW, y + winH) / (winW * winH);
            if (centerAvg > MAX_CENTER_BRIGHTNESS) continue;
            fineCandidates.push({ x, y, contrast, centerAvg });
          }
        }
      }
      if (fineCandidates.length === 0) return [];
      fineCandidates.sort((a, b) => b.contrast - a.contrast);

      // 重複除去
      const deduped = [];
      for (const cand of fineCandidates) {
        let tooClose = false;
        for (const kept of deduped) {
          const dx = cand.x - kept.x, dy = cand.y - kept.y;
          if (Math.sqrt(dx*dx + dy*dy) < MIN_CANDIDATE_DISTANCE) { tooClose = true; break; }
        }
        if (!tooClose) deduped.push(cand);
        if (deduped.length >= MAX_COMBO_CANDIDATES) break;
      }

      // 品質フィルタ + 精密中心座標
      const results = [];
      for (const cand of deduped) {
        let sx = 0, sy = 0, cnt = 0;
        for (let y = cand.y; y < Math.min(cand.y + winH, imgH); y++) {
          for (let x = cand.x; x < Math.min(cand.x + winW, imgW); x++) {
            if (gray[y * imgW + x] < DARK_THRESH) { sx += x; sy += y; cnt++; }
          }
        }
        if (cnt === 0) continue;
        const darkRatio = cnt / (winW * winH);
        if (darkRatio < DARK_PIXEL_RATIO_MIN) continue;

        let borderSum = 0, borderCnt = 0;
        const bx0 = Math.max(0, cand.x - BORDER_CHECK_DISTANCE);
        const by0 = Math.max(0, cand.y - BORDER_CHECK_DISTANCE);
        const bx1 = Math.min(imgW, cand.x + winW + BORDER_CHECK_DISTANCE);
        const by1 = Math.min(imgH, cand.y + winH + BORDER_CHECK_DISTANCE);
        for (let y = by0; y < by1; y++) {
          for (let x = bx0; x < bx1; x++) {
            if (x < cand.x || x >= cand.x + winW || y < cand.y || y >= cand.y + winH) {
              borderSum += gray[y * imgW + x]; borderCnt++;
            }
          }
        }
        if (borderCnt === 0 || borderSum / borderCnt < MIN_BORDER_BRIGHTNESS) continue;

        results.push({
          x: sx / cnt, y: sy / cnt,
          contrast: cand.contrast, brightness: cand.centerAvg,
          darkRatio, borderBrightness: borderSum / borderCnt
        });
      }
      return results;
    }

    // ── グレースケール + 積分画像の前処理 ─────────────────────
    function preprocessImage(imgData, imgW, imgH) {
      const d = imgData.data;
      const gray = new Uint8Array(imgW * imgH);
      for (let i = 0; i < imgW * imgH; i++) {
        const p = i * 4;
        gray[i] = Math.round(d[p] * 0.299 + d[p+1] * 0.587 + d[p+2] * 0.114);
      }

      const W1 = imgW + 1;
      const integ = new Int32Array((imgH + 1) * W1);
      for (let y = 1; y <= imgH; y++) {
        for (let x = 1; x <= imgW; x++) {
          integ[y * W1 + x] = gray[(y-1) * imgW + (x-1)]
            + integ[(y-1) * W1 + x] + integ[y * W1 + (x-1)] - integ[(y-1) * W1 + (x-1)];
        }
      }
      return { gray, integ, W1 };
    }

    // ── 領域内マーカー検出 ────────────────────────────────────
    function detectCornerCandidates(imgData, imgW, imgH, rx, ry, rw, rh, gray, integ, W1, params) {
      const { MARKER_SIZE_RATIO, MARGIN_RATIO, MIN_CONTRAST, DARK_THRESH,
              MAX_CENTER_BRIGHTNESS, DARK_PIXEL_RATIO_MIN, MIN_BORDER_BRIGHTNESS,
              BORDER_CHECK_DISTANCE } = params;

      const winW = Math.max(8, Math.round(imgW * MARKER_SIZE_RATIO));
      const winH = Math.max(8, Math.round(imgH * MARKER_SIZE_RATIO));
      const margin = Math.max(4, Math.round(winW * MARGIN_RATIO));

      function rectSum(x0, y0, x1, y1) {
        x0 = Math.max(0, x0); y0 = Math.max(0, y0);
        x1 = Math.min(imgW, x1); y1 = Math.min(imgH, y1);
        if (x0 >= x1 || y0 >= y1) return 0;
        return integ[y1*W1+x1] - integ[y0*W1+x1] - integ[y1*W1+x0] + integ[y0*W1+x0];
      }

      function calcContrast(x, y) {
        if (x + winW > imgW || y + winH > imgH) return -1;
        const centerS = rectSum(x, y, x + winW, y + winH);
        const centerAvg = centerS / (winW * winH);
        const ox0 = Math.max(0, x - margin), oy0 = Math.max(0, y - margin);
        const ox1 = Math.min(imgW, x + winW + margin), oy1 = Math.min(imgH, y + winH + margin);
        const outerS = rectSum(ox0, oy0, ox1, oy1);
        const surroundPixels = (ox1-ox0)*(oy1-oy0) - (winW*winH);
        if (surroundPixels <= 0) return -1;
        return (outerS - centerS) / surroundPixels - centerAvg;
      }

      const candidates = [];
      for (let y = ry; y + winH <= Math.min(ry + rh, imgH); y++) {
        for (let x = rx; x + winW <= Math.min(rx + rw, imgW); x++) {
          const contrast = calcContrast(x, y);
          if (contrast < MIN_CONTRAST) continue;
          const centerAvg = rectSum(x, y, x + winW, y + winH) / (winW * winH);
          if (centerAvg > MAX_CENTER_BRIGHTNESS) continue;

          let sx = 0, sy = 0, cnt = 0;
          for (let yy = y; yy < Math.min(y + winH, imgH); yy++) {
            for (let xx = x; xx < Math.min(x + winW, imgW); xx++) {
              if (gray[yy * imgW + xx] < DARK_THRESH) { sx += xx; sy += yy; cnt++; }
            }
          }
          if (cnt === 0) continue;
          const darkRatio = cnt / (winW * winH);
          if (darkRatio < DARK_PIXEL_RATIO_MIN) continue;

          let borderSum = 0, borderCnt = 0;
          const bx0 = Math.max(0, x - BORDER_CHECK_DISTANCE);
          const by0 = Math.max(0, y - BORDER_CHECK_DISTANCE);
          const bx1 = Math.min(imgW, x + winW + BORDER_CHECK_DISTANCE);
          const by1 = Math.min(imgH, y + winH + BORDER_CHECK_DISTANCE);
          for (let yy = by0; yy < by1; yy++) {
            for (let xx = bx0; xx < bx1; xx++) {
              if (xx < x || xx >= x + winW || yy < y || yy >= y + winH) {
                borderSum += gray[yy * imgW + xx]; borderCnt++;
              }
            }
          }
          if (borderCnt === 0 || borderSum / borderCnt < MIN_BORDER_BRIGHTNESS) continue;

          candidates.push({
            x: sx / cnt, y: sy / cnt,
            contrast, brightness: centerAvg, darkRatio,
            borderBrightness: borderSum / borderCnt
          });
        }
      }

      candidates.sort((a, b) => b.contrast - a.contrast);
      return candidates;
    }

    // ── 最良4点セット選択 ─────────────────────────────────────
    function selectBestMarkerSet(candidates, imgW, imgH, params) {
      if (candidates.length < 4) return null;
      const { A4_ASPECT_RATIO, A4_ASPECT_TOLERANCE, MIN_AREA_RATIO, MAX_AREA_RATIO,
              RECT_SCORE_WEIGHT, ASPECT_SCORE_WEIGHT, AREA_SCORE_WEIGHT,
              CONTRAST_SCORE_WEIGHT, MAX_COMBO_CANDIDATES } = params;
      const pool = candidates.slice(0, MAX_COMBO_CANDIDATES);
      const n = pool.length;
      const imgArea = imgW * imgH;

      function sortCorners(pts) {
        const byY = [...pts].sort((a, b) => a.y - b.y);
        const top = byY.slice(0, 2).sort((a, b) => a.x - b.x);
        const bot = byY.slice(2, 4).sort((a, b) => a.x - b.x);
        return [top[0], top[1], bot[1], bot[0]];
      }

      let bestScore = -Infinity, bestSet = null;

      for (let i = 0; i < n - 3; i++) {
        for (let j = i+1; j < n - 2; j++) {
          for (let k = j+1; k < n - 1; k++) {
            for (let l = k+1; l < n; l++) {
              const pts = [pool[i], pool[j], pool[k], pool[l]];
              const [tl, tr, br, bl] = sortCorners(pts);

              const d1 = Math.hypot(br.x - tl.x, br.y - tl.y);
              const d2 = Math.hypot(bl.x - tr.x, bl.y - tr.y);
              if (d1 === 0 || d2 === 0) continue;
              const rs = Math.min(d1, d2) / Math.max(d1, d2);
              if (rs < 0.6) continue;

              const w = (Math.hypot(tr.x-tl.x, tr.y-tl.y) + Math.hypot(br.x-bl.x, br.y-bl.y)) / 2;
              const h = (Math.hypot(bl.x-tl.x, bl.y-tl.y) + Math.hypot(br.x-tr.x, br.y-tr.y)) / 2;
              if (w === 0 || h === 0) continue;
              const aspect = Math.max(w, h) / Math.min(w, h);
              const as_ = Math.max(0, 1 - Math.abs(aspect - A4_ASPECT_RATIO) / A4_ASPECT_TOLERANCE);
              if (as_ === 0) continue;

              const area = Math.abs(
                (tl.x*tr.y - tr.x*tl.y) + (tr.x*br.y - br.x*tr.y) +
                (br.x*bl.y - bl.x*br.y) + (bl.x*tl.y - tl.x*bl.y)
              ) / 2;
              const aRatio = area / imgArea;
              if (aRatio < MIN_AREA_RATIO || aRatio > MAX_AREA_RATIO) continue;
              const ars = Math.max(0, 1 - Math.abs(aRatio - 0.35) / 0.30);

              const cs = Math.min(1, pts.reduce((s,p) => s + p.contrast, 0) / (4 * 255));

              const score = rs * RECT_SCORE_WEIGHT + as_ * ASPECT_SCORE_WEIGHT
                          + ars * AREA_SCORE_WEIGHT + cs * CONTRAST_SCORE_WEIGHT;
              if (score > bestScore) { bestScore = score; bestSet = [tl, tr, br, bl]; }
            }
          }
        }
      }
      return bestSet;
    }

    const detectCanvas = document.createElement('canvas');
    const DETECT_WIDTH = 1280;
    const overlayCanvas = document.getElementById('detectionOverlay');
    let autoShutterEnabled = true;
    let frameCount = 0;
    let detectCount = 0;
    const DETECT_INTERVAL = 3;    // 短い時間用に 6 → 3
    const DETECT_THRESHOLD = 5;   // 短い時間用に 15 → 5（約 0.5 秒）
    let animId = null;
    let savedDetectCanvas = null;  // 自動撮影時に検出した detectCanvas を保存

    function drawDetectionMarkers(bestSet) {
      if (!bestSet || bestSet.length !== 4) return;

      overlayCanvas.width = video.clientWidth;
      overlayCanvas.height = video.clientHeight;

      // detectCanvas 座標 → video 座標
      const videoScale = video.videoWidth / DETECT_WIDTH;
      const videoMarkers = bestSet.map(pt => ({
        x: pt.x * videoScale,
        y: pt.y * videoScale
      }));

      // video 座標 → 画面座標
      const offset = getCoverOffset(video);
      const screenMarkers = videoMarkers.map(m => ({
        x: m.x / offset.scaleX + offset.offsetX,
        y: m.y / offset.scaleY + offset.offsetY
      }));

      const ctx = overlayCanvas.getContext('2d');

      // 4点を赤い円で描画
      ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
      for (const m of screenMarkers) {
        ctx.beginPath();
        ctx.arc(m.x, m.y, 10, 0, Math.PI * 2);
        ctx.fill();
      }

      // 4点を赤い線で結ぶ
      ctx.strokeStyle = 'rgba(255, 0, 0, 0.8)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(screenMarkers[0].x, screenMarkers[0].y);
      for (let i = 1; i < 4; i++) {
        ctx.lineTo(screenMarkers[i].x, screenMarkers[i].y);
      }
      ctx.lineTo(screenMarkers[0].x, screenMarkers[0].y); // 閉じる
      ctx.stroke();
    }

    function clearDetectionOverlay() {
      overlayCanvas.width = video.clientWidth;
      overlayCanvas.height = video.clientHeight;
      overlayCanvas.getContext('2d').clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    }

    function drawDebugOverlay(detectedPts, cornerDefs, rangeW, rangeH, frameRect) {
      console.log(`drawDebugOverlay called: ${detectedPts.length} points, rangeW=${rangeW}, rangeH=${rangeH}`);
      overlayCanvas.width = video.clientWidth;
      overlayCanvas.height = video.clientHeight;
      const ctx = overlayCanvas.getContext('2d');
      console.log(`overlayCanvas: ${overlayCanvas.width}x${overlayCanvas.height}`);

      // detectCanvas 座標 → video 座標への変換
      const videoScale = video.videoWidth / DETECT_WIDTH;
      const offset = getCoverOffset(video);

      function detectToScreen(detPt) {
        const videoPt = {
          x: detPt.x * videoScale,
          y: detPt.y * videoScale
        };
        return {
          x: videoPt.x / offset.scaleX + offset.offsetX,
          y: videoPt.y / offset.scaleY + offset.offsetY
        };
      }

      // A4 フレーム四隅を 緑色のドット で描画（確認用）
      ctx.fillStyle = 'rgba(0, 255, 0, 0.8)';
      ctx.beginPath();
      ctx.arc(frameRect.left, frameRect.top, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(frameRect.right, frameRect.top, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(frameRect.left, frameRect.bottom, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(frameRect.right, frameRect.bottom, 5, 0, Math.PI * 2);
      ctx.fill();
      console.log(`A4 Frame (green dots): TL(${frameRect.left},${frameRect.top}) BR(${frameRect.right},${frameRect.bottom})`);

      // frameRect（緑のドット）を基準に、画面座標で探索範囲を黄色い枠で描画
      const screenRangeW = rangeW * videoScale / offset.scaleX;
      const screenRangeH = rangeH * videoScale / offset.scaleY;

      ctx.strokeStyle = 'rgba(255, 255, 0, 0.8)';
      ctx.lineWidth = 3;

      // 4 隅ごとに黄色い枠を描画（緑のドット = 黄色い枠のコーナー）
      const searches = [
        { name: 'TL', x: frameRect.left, y: frameRect.top },
        { name: 'TR', x: frameRect.right - screenRangeW, y: frameRect.top },
        { name: 'BL', x: frameRect.left, y: frameRect.bottom - screenRangeH },
        { name: 'BR', x: frameRect.right - screenRangeW, y: frameRect.bottom - screenRangeH }
      ];

      for (const search of searches) {
        ctx.strokeRect(search.x, search.y, screenRangeW, screenRangeH);

        // コーナー名を表示
        ctx.fillStyle = 'rgba(255, 255, 0, 1)';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(search.name, search.x + 5, search.y + 15);
      }

      console.log(`screenRangeW=${screenRangeW.toFixed(0)}, screenRangeH=${screenRangeH.toFixed(0)}`);

      // 検出点を赤い四角で描画＋座標表示
      for (let i = 0; i < detectedPts.length; i++) {
        const screenPt = detectToScreen(detectedPts[i]);

        // 赤い四角
        ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
        ctx.fillRect(screenPt.x - 8, screenPt.y - 8, 16, 16);

        // 座標テキスト
        ctx.fillStyle = 'rgba(255, 0, 0, 1)';
        ctx.font = 'bold 11px Arial';
        ctx.fillText(`(${detectedPts[i].x.toFixed(0)},${detectedPts[i].y.toFixed(0)})`, screenPt.x + 12, screenPt.y + 5);
      }

      // 画面左上に debug 情報を表示
      const debugX = 10;
      let debugY = 60;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(debugX - 5, 45, 300, 200);

      ctx.fillStyle = 'rgba(255, 255, 255, 1)';
      ctx.font = '10px monospace';

      ctx.fillText(`Range: W=${rangeW.toFixed(0)} H=${rangeH.toFixed(0)}`, debugX, debugY);
      debugY += 15;
      ctx.fillText(`Detected: ${detectedPts.length}/4`, debugX, debugY);
      debugY += 15;

      for (let i = 0; i < cornerDefs.length; i++) {
        const corner = cornerDefs[i];
        const pt = detectedPts[i] || { x: '?', y: '?' };
        const ptStr = detectedPts[i] ? `(${detectedPts[i].x.toFixed(0)},${detectedPts[i].y.toFixed(0)})` : 'NONE';
        ctx.fillText(`${corner.name}: ${ptStr}`, debugX, debugY);
        debugY += 12;
      }

      debugY += 5;
      ctx.fillText(`Frame: (${frameRect.width.toFixed(0)}x${frameRect.height.toFixed(0)})`, debugX, debugY);
      debugY += 12;
      ctx.fillText(`Range: (${screenRangeW.toFixed(0)}x${screenRangeH.toFixed(0)})`, debugX, debugY);
    }

    function autoShutterLoop() {
      animId = requestAnimationFrame(autoShutterLoop);
      if (!video.srcObject || !autoShutterEnabled) return;

      frameCount++;
      if (frameCount % DETECT_INTERVAL !== 0) return;

      const scale = DETECT_WIDTH / video.videoWidth;
      detectCanvas.width = DETECT_WIDTH;
      detectCanvas.height = Math.round(video.videoHeight * scale);
      detectCanvas.getContext('2d').drawImage(video, 0, 0, detectCanvas.width, detectCanvas.height);

      const imgData = detectCanvas.getContext('2d').getImageData(
        0, 0, detectCanvas.width, detectCanvas.height
      );

      // A4 フレーム四隅の画面座標を取得
      const frameRect = a4Frame.getBoundingClientRect();
      const frameTL = { x: frameRect.left, y: frameRect.top };
      const frameTR = { x: frameRect.right, y: frameRect.top };
      const frameBL = { x: frameRect.left, y: frameRect.bottom };
      const frameBR = { x: frameRect.right, y: frameRect.bottom };

      // 画面座標 → detectCanvas 座標に変換
      const offset = getCoverOffset(video);
      const detScale = scale;

      function screenToDetect(screenPt) {
        const videoPt = {
          x: (screenPt.x - offset.offsetX) * offset.scaleX,
          y: (screenPt.y - offset.offsetY) * offset.scaleY
        };
        return {
          x: videoPt.x * detScale,
          y: videoPt.y * detScale
        };
      }

      const detFrameTL = screenToDetect(frameTL);
      const detFrameTR = screenToDetect(frameTR);
      const detFrameBL = screenToDetect(frameBL);
      const detFrameBR = screenToDetect(frameBR);

      // 4 領域を定義（黄色い枠と同じ）
      const videoScale = video.videoWidth / DETECT_WIDTH;
      const screenRangeW = Math.round(Math.abs(detFrameTR.x - detFrameTL.x) * MARKER_DETECT_PARAMS.DETECTION_RANGE_RATIO * videoScale / offset.scaleX);
      const screenRangeH = Math.round(Math.abs(detFrameBL.y - detFrameTL.y) * MARKER_DETECT_PARAMS.DETECTION_RANGE_RATIO * videoScale / offset.scaleY);

      // DEBUG: 黄色い枠のサイズを確認
      if (frameCount % 30 === 0) {
        console.log(`黄色い枠 - W: ${screenRangeW}, H: ${screenRangeH}, DETECTION_RANGE_RATIO: ${MARKER_DETECT_PARAMS.DETECTION_RANGE_RATIO}`);
      }

      // 黄色い枠の４隅（画面座標）
      const searches = [
        { name: 'TL', x: frameRect.left, y: frameRect.top },
        { name: 'TR', x: frameRect.right - screenRangeW, y: frameRect.top },
        { name: 'BL', x: frameRect.left, y: frameRect.bottom - screenRangeH },
        { name: 'BR', x: frameRect.right - screenRangeW, y: frameRect.bottom - screenRangeH }
      ];

      // 黄色い枠の４隅を detectCanvas 座標に変換
      const cornerDefs = searches.map(s => {
        const detPt = screenToDetect({ x: s.x, y: s.y });
        return {
          name: s.name,
          rx: Math.round(detPt.x),
          ry: Math.round(detPt.y)
        };
      });

      // rangeW, rangeH は detectCanvas 座標での範囲サイズ
      const rangeW = Math.round(screenRangeW * videoScale / offset.scaleX);
      const rangeH = Math.round(screenRangeH * videoScale / offset.scaleY);

      console.log(`cornerDefs: rangeW=${rangeW}, rangeH=${rangeH}`);
      for (const corner of cornerDefs) {
        console.log(`  ${corner.name}: rx=${corner.rx}, ry=${corner.ry}`);
      }

      // プリプロセス（1 回のみ）
      const { gray, integ, W1 } = preprocessImage(imgData, detectCanvas.width, detectCanvas.height);

      // 4 領域スキャン
      const detectedPts = [];

      for (let i = 0; i < cornerDefs.length; i++) {
        const corner = cornerDefs[i];
        const cands = detectCornerCandidates(imgData, detectCanvas.width, detectCanvas.height,
          corner.rx, corner.ry, rangeW, rangeH,
          gray, integ, W1, MARKER_DETECT_PARAMS);
        if (cands.length > 0) {
          const pt = cands[0];
          detectedPts.push(pt);
          console.log(`${corner.name}: 検出 (${pt.x.toFixed(0)}, ${pt.y.toFixed(0)}) C=${pt.contrast.toFixed(1)}`);
          console.log(`  範囲: x[${corner.rx}-${corner.rx + rangeW}], y[${corner.ry}-${corner.ry + rangeH}]`);
          console.log(`  フレーム座標: TL(${detFrameTL.x.toFixed(0)},${detFrameTL.y.toFixed(0)}) ~ BR(${detFrameBR.x.toFixed(0)},${detFrameBR.y.toFixed(0)})`);
        } else {
          console.log(`${corner.name}: 検出失敗`);
        }
      }

      console.log(`検出数: ${detectedPts.length}/4`);

      // 常にデバッグ表示（検出失敗時も黄色い枠を見せる）
      drawDebugOverlay(detectedPts, cornerDefs, screenRangeW, screenRangeH, frameRect);

      if (detectedPts.length === 4) {
        drawDetectionMarkers(detectedPts);
        detectCount++;
        console.log(`連続検出: ${detectCount}/${DETECT_THRESHOLD}`);
        a4Frame.style.borderColor = `rgba(34, 197, 94, ${0.4 + detectCount / DETECT_THRESHOLD * 0.6})`;
        if (detectCount >= DETECT_THRESHOLD) {
          console.log('自動撮影実行！');
          autoShutterEnabled = false;
          // 検出時点の detectCanvas を保存
          savedDetectCanvas = document.createElement('canvas');
          savedDetectCanvas.width = detectCanvas.width;
          savedDetectCanvas.height = detectCanvas.height;
          savedDetectCanvas.getContext('2d').drawImage(detectCanvas, 0, 0);
          captureBtn.click();
        }
      } else {
        if (detectCount > 0) {
          console.log(`検出失敗 - カウント ${detectCount} をリセット`);
        }
        detectCount = 0;
        a4Frame.style.borderColor = 'rgba(255, 255, 255, 0.6)';
      }
    }

    function stopCamera() {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 4000 },
            height: { ideal: 6000 }
          }
        });
        video.srcObject = stream;
        video.addEventListener('loadedmetadata', () => {
          autoShutterLoop();
        }, { once: true });
      } catch (err) {
        showError('カメラを起動できませんでした。ブラウザの設定でアクセスを許可してください。');
        console.error(err);
      }
    }

    function getCoverOffset(video) {
      const vW = video.videoWidth;
      const vH = video.videoHeight;
      const eW = video.clientWidth;
      const eH = video.clientHeight;

      const videoAspect = vW / vH;
      const elemAspect = eW / eH;

      let renderW, renderH, offsetX, offsetY;

      if (videoAspect > elemAspect) {
        // ビデオが横長：上下がクリップされずに左右がはみ出す
        renderH = eH;
        renderW = eH * videoAspect;
        offsetX = (renderW - eW) / 2;
        offsetY = 0;
      } else {
        // ビデオが縦長：左右がクリップされずに上下がはみ出す
        renderW = eW;
        renderH = eW / videoAspect;
        offsetX = 0;
        offsetY = (renderH - eH) / 2;
      }

      return {
        offsetX,
        offsetY,
        scaleX: vW / renderW,
        scaleY: vH / renderH
      };
    }

    captureBtn.addEventListener('click', () => {
      alert('📸 撮影ボタンクリック');
      autoShutterEnabled = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }

      if (!video.srcObject) {
        showError('カメラがまだ起動していません。');
        return;
      }

      const frameRect = a4Frame.getBoundingClientRect();
      const { offsetX, offsetY, scaleX, scaleY } = getCoverOffset(video);

      // 画面座標をビデオ座標に変換
      const srcX = (frameRect.left + offsetX) * scaleX;
      const srcY = (frameRect.top + offsetY) * scaleY;
      const srcW = frameRect.width * scaleX;
      const srcH = frameRect.height * scaleY;

      // トリミング用Canvas
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(srcW);
      canvas.height = Math.round(srcH);

      const ctx = canvas.getContext('2d');

      // savedDetectCanvas があれば（自動撮影時）それを使う、なければ video から撮る
      if (savedDetectCanvas) {
        // detectCanvas 座標系に変換
        const detScale = DETECT_WIDTH / video.videoWidth;
        const detSrcX = srcX * detScale;
        const detSrcY = srcY * detScale;
        const detSrcW = srcW * detScale;
        const detSrcH = srcH * detScale;
        ctx.drawImage(savedDetectCanvas, detSrcX, detSrcY, detSrcW, detSrcH, 0, 0, srcW, srcH);
        console.log('自動撮影時の detectCanvas を使用');
      } else {
        ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);
        console.log('手動撮影：video から撮影');
      }

      alert('📸 キャンバスに描画完了。Blob変換中...');

      // 送信中UI表示
      const original = document.body.innerHTML;
      document.body.innerHTML = '<div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; z-index: 1000;"><div style="text-align: center;"><div>📸 送信中...</div><div style="font-size: 12px; margin-top: 10px; color: #ccc;">カメラを分析しています</div></div></div>';

      // Blob変換 → postMessage → 閉じる
      canvas.toBlob(blob => {
        if (!blob) {
          showError('⚠️ Blob が null です');
          return;
        }

        // iOS Safari 非対応の blob.arrayBuffer() の代わりに FileReader を使用
        const reader = new FileReader();

        reader.onload = (e) => {
          const buffer = e.target.result;

          if (!window.opener) {
            showError('⚠️ 親ウィンドウが見つかりません');
            return;
          }

          window.opener.postMessage(
            {
              type: 'cameraCaptureDebug',
              buffer,
              fileName: `camera_${Date.now()}.jpg`
            },
            '*'
          );

          stopCamera();
          savedDetectCanvas = null;  // リセット
          // marker_debug からの確認メッセージを待つ（message listener で処理）
        };

        reader.onerror = (e) => {
          showError(`ファイル読み込みエラー: ${e}`);
        };

        reader.readAsArrayBuffer(blob);
      }, 'image/jpeg', 0.95);
    });

    // marker_debug からの確認メッセージを受け取ったら window を閉じる
    window.addEventListener('message', (event) => {
      if (event.data?.type !== 'cameraCaptureAcknowledged') return;
      window.close();
    });

    closeBtn.addEventListener('click', () => {
      stopCamera();
      window.close();
    });

    window.addEventListener('beforeunload', stopCamera);

    // カメラ起動
    startCamera();
  </script>
</body>
</html>
