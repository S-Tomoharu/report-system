<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Gemini OCR テスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; font-size: 14px; background: #f5f5f5; padding: 24px; }
    h1 { font-size: 18px; margin-bottom: 20px; color: #333; }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }

    /* ファイルアップロード */
    #drop-area {
      border: 2px dashed #aaa;
      border-radius: 6px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      color: #888;
      transition: background 0.2s;
    }
    #drop-area.hover { background: #eef4ff; border-color: #4a90e2; }
    #drop-area.has-file { background: #f0fff4; border-color: #52c41a; color: #333; }
    #file-input { display: none; }

    /* プロンプト */
    #prompt {
      width: 100%;
      height: 280px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
      resize: vertical;
      line-height: 1.6;
    }

    /* 実行ボタン */
    #run-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #4a90e2;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #run-btn:hover:not(:disabled) { background: #357abd; }
    #run-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* 結果 */
    #result { display: none; }
    .result-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .badge-ok  { background: #d4f7dc; color: #2e7d32; }
    .badge-err { background: #fde8e8; color: #c62828; }

    .parsed-box {
      background: #f0fff4;
      border: 1px solid #52c41a;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 2px;
    }
    .raw-box {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 12px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }
    .section-title {
      font-size: 12px;
      font-weight: bold;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1>OCR テスト</h1>

  <!-- プロバイダー切り替え -->
  <div class="card" style="display:flex; align-items:center; gap:16px; padding:14px 20px;">
    <span style="font-weight:bold; color:#555;">AI プロバイダー</span>
    <div id="toggle" style="display:flex; background:#eee; border-radius:6px; overflow:hidden; cursor:pointer;">
      <div id="btn-gemini" onclick="setProvider('gemini')"
           style="padding:8px 20px; font-weight:bold; font-size:13px; transition:background 0.2s;">Gemini</div>
      <div id="btn-claude" onclick="setProvider('claude')"
           style="padding:8px 20px; font-weight:bold; font-size:13px; transition:background 0.2s;">Claude</div>
    </div>
    <span id="provider-note" style="font-size:12px; color:#888;"></span>
  </div>

  <!-- ファイル選択 -->
  <div class="card">
    <label>ファイル（PDF または 画像）</label>
    <div id="drop-area" onclick="document.getElementById('file-input').click()">
      クリックしてファイルを選択（またはここにドロップ）
    </div>
    <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png">
  </div>

  <!-- プロンプト編集 -->
  <div class="card">
    <label>プロンプト（編集可）</label>
    <textarea id="prompt"></textarea>
  </div>

  <!-- 実行ボタン -->
  <button id="run-btn" onclick="run()" disabled>ファイルを選択してください</button>

  <!-- 結果 -->
  <div class="card" id="result" style="margin-top:16px;">
    <div id="badge"></div>
    <div id="parsed-area"></div>
    <div class="section-title" id="raw-label">AIの生の返答</div>
    <div class="raw-box" id="raw"></div>
  </div>

  <script>
    let selectedFile = null;
    let currentProvider = 'gemini';

    // ── 初期化：デフォルトプロンプトを読み込む ──────────────
    function initializePrompt() {
      google.script.run
        .withSuccessHandler(function(defaultPrompt) {
          document.getElementById('prompt').value = defaultPrompt;
        })
        .getDefaultPrompt();
    }
    window.addEventListener('load', initializePrompt);

    // ── プロバイダー切り替え ─────────────────────────────
    function setProvider(p) {
      currentProvider = p;
      document.getElementById('btn-gemini').style.background = p === 'gemini' ? '#4a90e2' : '';
      document.getElementById('btn-gemini').style.color      = p === 'gemini' ? '#fff'     : '';
      document.getElementById('btn-claude').style.background = p === 'claude' ? '#7c3aed' : '';
      document.getElementById('btn-claude').style.color      = p === 'claude' ? '#fff'     : '';
      document.getElementById('provider-note').textContent =
        p === 'gemini' ? 'gemini-2.5-flash' : 'claude-haiku-4-5';
      document.getElementById('raw-label').textContent =
        (p === 'gemini' ? 'Gemini' : 'Claude') + ' の生の返答';
    }
    setProvider('gemini'); // 初期状態

    // ── ドラッグ＆ドロップ ──────────────────────────────
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');

    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('hover'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('hover'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.classList.remove('hover');
      setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));

    function setFile(file) {
      if (!file) return;
      selectedFile = file;
      dropArea.textContent = '✓ ' + file.name;
      dropArea.classList.add('has-file');
      document.getElementById('run-btn').disabled = false;
      document.getElementById('run-btn').textContent = '実行';
    }

    // ── 実行 ────────────────────────────────────────────
    function run() {
      if (!selectedFile) return;

      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      btn.textContent = '実行中...';
      document.getElementById('result').style.display = 'none';

      const reader = new FileReader();
      reader.onload = function(e) {
        // data:mime/type;base64,XXXX → XXXX 部分だけ取り出す
        const dataUrl = e.target.result;
        const base64  = dataUrl.split(',')[1];
        const mime    = selectedFile.type || 'application/octet-stream';
        const prompt  = document.getElementById('prompt').value;

        google.script.run
          .withSuccessHandler(showResult)
          .withFailureHandler(showError)
          .runMarksheetTest(base64, mime, prompt, currentProvider);
      };
      reader.readAsDataURL(selectedFile);
    }

    // ── 結果表示 ─────────────────────────────────────────
    function showResult(res) {
      const btn = document.getElementById('run-btn');
      btn.disabled = false;
      btn.textContent = '実行';

      const resultEl = document.getElementById('result');
      resultEl.style.display = 'block';

      const badge      = document.getElementById('badge');
      const parsedArea = document.getElementById('parsed-area');
      const rawEl      = document.getElementById('raw');

      rawEl.textContent = res.raw || '(空)';

      if (res.error) {
        badge.innerHTML = '<span class="result-badge badge-err">エラー</span>';
        parsedArea.innerHTML = '<div class="raw-box" style="color:#c62828;">' + res.error + '</div>';
        return;
      }

      const providerLabel = res.provider ? '・' + res.provider.toUpperCase() : '';
      if (res.parsed && res.parsed.class && res.parsed.tens !== undefined && res.parsed.ones !== undefined) {
        badge.innerHTML = '<span class="result-badge badge-ok">読み取り成功（HTTP ' + res.status + providerLabel + '）</span>';
        parsedArea.innerHTML =
          '<div class="parsed-box">' +
          'クラス: ' + res.parsed.class +
          '　十の位: ' + res.parsed.tens +
          '　一の位: ' + res.parsed.ones +
          '　→ ' + res.parsed.tens + res.parsed.ones + '番' +
          '</div>';
      } else {
        badge.innerHTML = '<span class="result-badge badge-err">パース失敗（HTTP ' + res.status + providerLabel + '）</span>';
        parsedArea.innerHTML = '';
      }
    }

    function showError(err) {
      document.getElementById('run-btn').disabled = false;
      document.getElementById('run-btn').textContent = '実行';
      showResult({ error: err.message || String(err) });
    }
  </script>
</body>
</html>
